<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>
<style>
 body {
   font-family: Arial;
   text-align: center;
   background: #0b1d0b;
   color: white;
 }
 button {
   padding: 10px;
   margin: 10px;
 }
 input {
   padding: 10px;
 }
 img {
   width: 200px;
   margin-top: 10px;
   border-radius: 10px;
 }
</style>
</head>

<body>

<h1>🌍 Nature Connect</h1>
<h3>Share your nature moments</h3>

<input id="text" placeholder="Write something..." />
<br><br>

<input type="file" id="imageInput" accept="image/*" />
<br>

<button onclick="post()">Post</button>

<h2>Feed</h2>
<div id="feed"></div>

<h2>AI Assistant 🤖</h2>
<input id="aiInput" placeholder="Ask something..." />
<button onclick="aiReply()">Ask AI</button>
<p id="aiOutput"></p>

<script>

// Load saved posts
let posts = JSON.parse(localStorage.getItem("posts")) || []
show()

function post(){
 let text = document.getElementById("text").value
 let file = document.getElementById("imageInput").files[0]

 if(text === "" && !file) return

 if(file){
   let reader = new FileReader()

   reader.onload = function(e){
     let postData = {
       text: text,
       image: e.target.result
     }

     posts.unshift(postData)
     localStorage.setItem("posts", JSON.stringify(posts))
     show()
   }

   reader.readAsDataURL(file)

 } else {
   let postData = {
     text: text,
     image: null
   }

   posts.unshift(postData)
   localStorage.setItem("posts", JSON.stringify(posts))
   show()
 }

 document.getElementById("text").value = ""
 document.getElementById("imageInput").value = ""
}

function show(){
 let html = ""

 posts.forEach(p=>{
   html += "<div>"

   if(p.text){
     html += "<p>🌿 " + p.text + "</p>"
   }

   if(p.image){
     html += "<img src='" + p.image + "'/>"
   }

   html += "</div><hr>"
 })

 document.getElementById("feed").innerHTML = html
}

function aiReply(){
 let input = document.getElementById("aiInput").value.toLowerCase()
 let reply = ""

 if(input.includes("hello")){
  reply = "Hello! Welcome to Nature Connect 🌿"
 }
 else if(input.includes("nature")){
  reply = "Nature is peaceful and powerful 🌄"
 }
 else if(input.includes("mountain")){
  reply = "Mountains are calm and powerful 🏔️"
 }
 else{
  reply = "I am learning... ask about nature 🙂"
 }

 document.getElementById("aiOutput").innerText = reply
}

</script>

</body>
</html>
