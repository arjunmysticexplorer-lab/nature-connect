<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: Arial;
  background: #0b1d0b;
  color: white;
  margin: 0;
}

h1 {
  background: #0f2f0f;
  padding: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: green;
  color: white;
}

.card {
  background: #1a2e1a;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

#feedSection {
  padding-bottom: 150px;
}
</style>

</head>

<body>

<h1>Nature Connect</h1>

<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">

<input id="postText" placeholder="Write post">
<button onclick="addPost()">Post</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSy...",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";

window.login=()=>{
 user=document.getElementById("username").value;
 document.getElementById("app").style.display="block";
 load();
}

// POST
window.addPost=async()=>{
 let text=document.getElementById("postText").value;
 await addDoc(collection(db,"posts"),{
  user,text,likes:0,comments:[]
 });
 load();
}

// COMMENT (FIXED SIMPLE)
window.addComment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value;
 if(!text)return;

 let ref = doc(db,"posts",id);

 let snap = await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id){
    comments=d.data().comments || [];
  }
 });

 comments.push(user+": "+text);

 await updateDoc(ref,{comments});

 input.value="";
 load();
}

// LOAD
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`
  <div class="card">
    <b>${p.user}</b>
    <p>${p.text}</p>

    ${(p.comments||[]).map(c=>`<div>${c}</div>`).join("")}

    <input id="c-${id}" placeholder="Comment">
    <button onclick="addComment('${id}')">Send</button>
  </div>
  `;
 });

 document.getElementById("feed").innerHTML=html;
}

// 🔥 keyboard fix
document.addEventListener("focusin",(e)=>{
 if(e.target.tagName==="INPUT"){
  setTimeout(()=>{
    e.target.scrollIntoView({block:"center"});
  },300);
 }
});

</script>

</body>
</html>
