<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;padding:12px;background:#0c2b0c;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
.card{background:#1b3b1b;padding:15px;border-radius:15px;margin:10px;}
img{width:100%;border-radius:10px;margin-top:10px;}
.chat-me{background:#00c853;padding:8px;margin:5px;border-radius:10px;text-align:right;}
.chat-other{background:#1b3b1b;padding:8px;margin:5px;border-radius:10px;}
</style>
</head>

<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<!-- FEED -->
<div id="feed">

<div class="card">
💰 QNC Balance: <span id="coinBal">0</span><br><br>
<button onclick="startMining()">⛏️ Start Mining</button>
</div>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
<h2 id="pname"></h2>
<p id="pcount"></p>
<p id="followers"></p>
</div>

<!-- NOTIFY -->
<div id="notify" style="display:none">
<h2>Notifications</h2>
<div id="note"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<input id="chatUser" placeholder="Enter user">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,getDocs,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",currentChatUser="";

// LOGIN
window.login=async()=>{
 user=username.value.trim();
 if(!user) return alert("Enter name");

 await setDoc(doc(db,"users",user),{
  coins:0,
  lastMine:0
 },{merge:true});

 loginBox.style.display="none";
 main.style.display="block";

 load();
 loadCoins();
};

// COINS LOAD
async function loadCoins(){
 let u=await getDoc(doc(db,"users",user));
 coinBal.innerText=u.data()?.coins||0;
}

// MINING
window.startMining=async()=>{
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 let now=Date.now();
 if(now-(data.lastMine||0)<86400000){
  alert("Come after 24h");
  return;
 }

 let coins=(data.coins||0)+10;

 await updateDoc(ref,{coins,lastMine:now});
 loadCoins();
 alert("⛏️ +10 QNC");
};

// NAV
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";}
window.showProfile=()=>{feed.style.display="none";profile.style.display="block";notify.style.display="none";chat.style.display="none";}
window.showNotifications=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="block";chat.style.display="none";}
window.showChat=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="block";}

// POST
window.addPost=async()=>{
 let text=postText.value;
 let fileInput=file.files[0];

 if(fileInput){
  let r=new FileReader();
  r.onload=async()=>{
   await addDoc(collection(db,"posts"),{
    user,text,image:r.result,likes:0,comments:[]
   });
   reward(10);
  };
  r.readAsDataURL(fileInput);
 }else{
  await addDoc(collection(db,"posts"),{
   user,text,image:"",likes:0,comments:[]
  });
  reward(10);
 }
};

// LIKE
window.like=async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 reward(1);
};

// COMMENT
window.sendComment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text) return;

 let ref=doc(db,"posts",id);
 let snap=await getDoc(ref);
 let comments=snap.data().comments||[];

 comments.push(user+": "+text);
 await updateDoc(ref,{comments});

 input.value="";
 reward(2);
};

// REWARD
async function reward(val){
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 await updateDoc(ref,{
  coins:(data.coins||0)+val
 });

 loadCoins();
}

// FEED (FIXED)
function load(){
 onSnapshot(collection(db,"posts"),s=>{
  let html="";

  s.forEach(d=>{
   let p=d.data();

   html+=`
   <div class="card">

    <b>${p.user}</b>

    <p>${p.text||""}</p>

    ${p.image?`<img src="${p.image}">`:""}

    <br>

    ❤️ ${p.likes||0}
    <button onclick="like('${d.id}',${p.likes||0})">Like</button>

    <div>
     ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}
    </div>

    <input id="c-${d.id}" placeholder="Write comment">
    <button onclick="sendComment('${d.id}')">Send</button>

   </div>
   `;
  });

  posts.innerHTML=html;
 });
}

// CHAT
window.openChat=()=>{currentChatUser=chatUser.value;}
window.sendMsg=async()=>{
 if(!msg.value) return;

 await addDoc(collection(db,"messages"),{
  from:user,to:currentChatUser,text:msg.value
 });

 msg.value="";
 loadChat();
};

function loadChat(){
 onSnapshot(collection(db,"messages"),s=>{
  let h="";
  s.forEach(d=>{
   let m=d.data();
   if(m.from===user||m.to===user){
    h+=`<div>${m.text}</div>`;
   }
  });
  chatBox.innerHTML=h;
 });
}

</script>

</body>
</html>
