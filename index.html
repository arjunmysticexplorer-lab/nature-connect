<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;padding:12px;background:#0c2b0c;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;margin:2px;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
.card{background:#1b3b1b;padding:15px;border-radius:15px;margin:10px;}
img,video{width:100%;border-radius:10px;margin-top:10px;}
.comment-box{display:flex;gap:5px;margin-top:10px;}
.comment-box input{flex:1;}
</style>

</head>
<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div id="feed">

<div class="card">
💰 QNC Balance: <span id="coinBal">0.00000</span><br><br>
<button onclick="startMining()">⛏️ Start Mining (24h)</button>
</div>

<div class="card">
<h3>💰 Wallet</h3>
<input id="sendUser" placeholder="Send to">
<input id="sendAmount">
<button onclick="sendCoins()">Send</button>
</div>

<div class="card">
<h3>💸 Withdraw</h3>
<input id="withdrawAmount">
<input id="upiId">
<button onclick="withdrawRequest()">Withdraw</button>
<div id="withdrawList"></div>
</div>

<input id="postText">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<div id="profile" style="display:none"><h2 id="pname"></h2></div>
<div id="notify" style="display:none"></div>

<div id="chat" style="display:none">
<input id="chatUser">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<div id="reels" style="display:none">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
<div id="reelBox"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",currentChatUser="";

// LOGIN
window.login=async()=>{
 user=username.value.trim();
 if(!user) return alert("Enter name");

 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{coins:0,miningStart:null,online:true});
 }else{
  await updateDoc(ref,{online:true});
 }

 loginBox.style.display="none";
 main.style.display="block";

 load(); loadCoins(); loadReels(); loadWithdraws();
};

// OFFLINE
window.addEventListener("beforeunload",async()=>{
 if(user){
  await updateDoc(doc(db,"users",user),{online:false});
 }
});

// NAV
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showProfile=()=>{feed.style.display="none";profile.style.display="block";pname.innerText=user;}
window.showNotifications=()=>{notify.style.display="block";feed.style.display="none";}
window.showChat=()=>{chat.style.display="block";feed.style.display="none";}
window.showReels=()=>{reels.style.display="block";feed.style.display="none";}

// 🔥 START MINING (24H)
window.startMining=async()=>{
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 if(data.miningStart){
  alert("Mining already running");
  return;
 }

 await updateDoc(ref,{miningStart:Date.now()});
 alert("⛏️ Mining started for 24 hours");
};

// 🔥 LOAD COINS (AUTO CALC)
async function loadCoins(){

 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 let coins=data.coins||0;
 let start=data.miningStart;

 if(start){
  let now=Date.now();
  let seconds=Math.floor((now-start)/1000);

  let max=86400;
  if(seconds>max) seconds=max;

  let earned=seconds*0.01;
  let total=coins+earned;

  await updateDoc(ref,{coins:total,miningStart:null});
  coinBal.innerText=total.toFixed(5);
 }else{
  coinBal.innerText=coins.toFixed(5);
 }
}

// बाकी features SAME

window.sendCoins=async()=>{
 let toUser=sendUser.value;
 let amount=parseFloat(sendAmount.value);

 let sRef=doc(db,"users",user);
 let rRef=doc(db,"users",toUser);

 let sData=(await getDoc(sRef)).data();

 if((sData.coins||0)<amount)return;

 await updateDoc(sRef,{coins:sData.coins-amount});

 let rData=(await getDoc(rRef)).data();
 await updateDoc(rRef,{coins:(rData.coins||0)+amount});

 loadCoins();
};

window.withdrawRequest=async()=>{
 let amount=parseFloat(withdrawAmount.value);
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 if((data.coins||0)<amount)return;

 await updateDoc(ref,{coins:data.coins-amount});

 await addDoc(collection(db,"withdraws"),{
  user,amount,status:"pending"
 });

 loadCoins();
};

function loadWithdraws(){
 onSnapshot(collection(db,"withdraws"),s=>{
  let h="";
  s.forEach(d=>{
   let w=d.data();
   if(w.user===user){
    h+=`<div>${w.amount} - ${w.status}</div>`;
   }
  });
  withdrawList.innerHTML=h;
 });
}

// POSTS
window.addPost=async()=>{
 let text=postText.value;
 let f=file.files[0];

 if(f){
  let r=new FileReader();
  r.onload=async()=>{
   await addDoc(collection(db,"posts"),{user,text,image:r.result,likes:0,comments:[]});
  };
  r.readAsDataURL(f);
 }else{
  await addDoc(collection(db,"posts"),{user,text,image:"",likes:0,comments:[]});
 }
};

window.like=async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
};

window.sendComment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text)return;

 let ref=doc(db,"posts",id);
 let snap=await getDoc(ref);
 let comments=snap.data().comments||[];

 comments.push(user+": "+text);
 await updateDoc(ref,{comments});
 input.value="";
};

function load(){
 onSnapshot(collection(db,"posts"),async s=>{
  let html="";
  for(const d of s.docs){
   let p=d.data();

   let uDoc=await getDoc(doc(db,"users",p.user));
   let online=uDoc.data()?.online;

   html+=`
   <div class="card">
   <b>${p.user} ${online?"🟢":"⚫"}</b>
   <p>${p.text||""}</p>
   ${p.image?`<img src="${p.image}">`:""}
   ❤️ ${p.likes||0}
   <button onclick="like('${d.id}',${p.likes||0})">Like</button>
   <div>${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}</div>
   <input id="c-${d.id}">
   <button onclick="sendComment('${d.id}')">Send</button>
   </div>`;
  }
  posts.innerHTML=html;
 });
}

// CHAT
window.openChat=()=>{currentChatUser=chatUser.value;}
window.sendMsg=async()=>{
 await addDoc(collection(db,"messages"),{from:user,to:currentChatUser,text:msg.value});
 msg.value="";
};

// REELS
window.uploadReel=async()=>{
 let f=reelFile.files[0];
 let r=new FileReader();
 r.onload=async()=>{
  await addDoc(collection(db,"reels"),{user,video:r.result});
 };
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),s=>{
  let h="";
  s.forEach(d=>{
   let r=d.data();
   h+=`<video src="${r.video}" controls></video>`;
  });
  reelBox.innerHTML=h;
 });
}

</script>

</body>
</html>
