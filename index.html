<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
 body {
   font-family: Arial;
   background: #0b1d0b;
   color: white;
   text-align: center;
 }

 input, button {
   padding: 10px;
   margin: 5px;
 }

 img {
   width: 100%;
   margin-top: 10px;
 }
</style>

</head>

<body>

<h1>Nature Connect</h1>

<!-- LOGIN -->
<div id="loginPage">
<input id="username" placeholder="Enter name" />
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appPage" style="display:none;">

<h3 id="welcome"></h3>

<input id="text" placeholder="Say something..." />
<br>

<input type="file" id="imageInput" accept="image/*" />
<br>

<button onclick="post()">Post</button>

<div id="feed"></div>

</div>

<script>

let currentUser = localStorage.getItem("user") || ""

if(currentUser){
 showApp()
}

function login(){
 let name = document.getElementById("username").value
 if(name){
  currentUser = name
  localStorage.setItem("user", name)
  showApp()
 }
}

function showApp(){
 document.getElementById("loginPage").style.display = "none"
 document.getElementById("appPage").style.display = "block"
 document.getElementById("welcome").innerText = "Welcome " + currentUser
 loadPosts()
}

function getPosts(){
 return JSON.parse(localStorage.getItem(currentUser+"_posts")) || []
}

function savePosts(posts){
 localStorage.setItem(currentUser+"_posts", JSON.stringify(posts))
}

function post(){
 let text = document.getElementById("text").value
 let file = document.getElementById("imageInput").files[0]

 alert("Post button clicked") // DEBUG

 let posts = getPosts()

 if(file){
   let reader = new FileReader()

   reader.onload = function(e){
     alert("Image loaded") // DEBUG

     let post = {
       text: text,
       image: e.target.result
     }

     posts.unshift(post)
     savePosts(posts)
     loadPosts()
   }

   reader.readAsDataURL(file)

 } else {
   let post = {
     text: text,
     image: null
   }

   posts.unshift(post)
   savePosts(posts)
   loadPosts()
 }

}

function loadPosts(){
 let posts = getPosts()
 let html = ""

 posts.forEach(p=>{
   html += "<div>"
   if(p.text) html += "<p>" + p.text + "</p>"
   if(p.image) html += "<img src='"+p.image+"'/>"
   html += "</div><hr>"
 })

 document.getElementById("feed").innerHTML = html
}

</script>

</body>
</html>
