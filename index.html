<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: Arial;
  background: #0b1d0b;
  color: white;
  margin: 0;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f2f0f;
  padding:10px;
}

input {
  width: 85%;
  padding: 12px;
  margin: 8px;
  border-radius: 20px;
  border: none;
  background: #0f2f0f;
  color: white;
}

button {
  padding: 8px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg,#00c853,#64dd17);
  color: white;
  margin:3px;
}

.card {
  background:#1a2e1a;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="topbar">
<h3>🌍 Nature Connect</h3>

<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
</div>
</div>

<div id="loginPage">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<!-- FEED -->
<div id="feedSection">
<input id="text" placeholder="Write post">
<input type="file" id="imageInput">
<button onclick="post()">Post</button>
<div id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none;">
<h2 id="profileName"></h2>
<p id="postCount"></p>
<p id="followerCount"></p>
<div id="profilePosts"></div>
</div>

<!-- NOTIFICATION -->
<div id="notificationSection" style="display:none;">
<h2>🔔 Notifications</h2>
<div id="notifications"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";

// LOGIN
window.login = async ()=>{
 user=document.getElementById("username").value.trim();
 if(!user) return alert("Enter name");

 await setDoc(doc(db,"users",user),{
  followers:[],
  following:[]
 },{merge:true});

 document.getElementById("loginPage").style.display="none";
 document.getElementById("app").style.display="block";

 load();
};

// NAV
window.showFeed=()=>{
 feedSection.style.display="block";
 profileSection.style.display="none";
 notificationSection.style.display="none";
};

window.showProfile=()=>{
 feedSection.style.display="none";
 profileSection.style.display="block";
 notificationSection.style.display="none";
 loadProfile();
};

window.showNotifications=()=>{
 feedSection.style.display="none";
 profileSection.style.display="none";
 notificationSection.style.display="block";
 loadNotifications();
};

// POST
window.post=async()=>{
 let text=textInput.value.trim();
 let file=imageInput.files[0];

 if(!text && !file) return;

 if(file){
  let reader=new FileReader();
  reader.onloadend=async()=>{
   await addDoc(collection(db,"posts"),{
    user,text,image:reader.result,comments:[],likes:0
   });
   reset();
  };
  reader.readAsDataURL(file);
 }else{
  await addDoc(collection(db,"posts"),{
   user,text,image:"",comments:[],likes:0
  });
  reset();
 }
};

function reset(){
 textInput.value="";
 imageInput.value="";
 load();
}

// LIKE
window.likePost=async(id,likes,owner)=>{
 await updateDoc(doc(db,"posts",id),{
  likes:(likes||0)+1
 });

 if(owner!==user){
  await addDoc(collection(db,"notifications"),{
   text:user+" liked your post",
   to:owner
  });
 }

 load();
};

// COMMENT
window.addComment=async(id,owner)=>{
 let input=document.getElementById("c-"+id);
 let txt=input.value.trim();
 if(!txt) return;

 let snap=await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id) comments=d.data().comments||[];
 });

 comments.push(user+": "+txt);

 await updateDoc(doc(db,"posts",id),{comments});

 if(owner!==user){
  await addDoc(collection(db,"notifications"),{
   text:user+" commented: "+txt,
   to:owner
  });
 }

 input.value="";
 load();
};

// FOLLOW
window.followUser=async(target)=>{
 if(target===user) return;

 let myRef=doc(db,"users",user);
 let tRef=doc(db,"users",target);

 let my=(await getDoc(myRef)).data();
 let t=(await getDoc(tRef)).data();

 let following=my.following||[];
 let followers=t.followers||[];

 if(following.includes(target)){
  following=following.filter(u=>u!==target);
  followers=followers.filter(u=>u!==user);
 }else{
  following.push(target);
  followers.push(user);
 }

 await updateDoc(myRef,{following});
 await updateDoc(tRef,{followers});

 alert("Follow updated");
};

// LOAD
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`
  <div class="card">
    <b>${p.user}</b>
    ${p.user!==user?`<button onclick="followUser('${p.user}')">Follow</button>`:""}

    <p>${p.text}</p>

    ${p.image&&p.image.startsWith("data:image")?
    `<img src="${p.image}" style="width:100%">`:""}

    ❤️ ${p.likes||0}
    <button onclick="likePost('${id}',${p.likes||0},'${p.user}')">Like</button>

    ${(p.comments||[]).map(c=>`<div>${c}</div>`).join("")}

    <input id="c-${id}">
    <button onclick="addComment('${id}','${p.user}')">Send</button>
  </div>`;
 });

 feed.innerHTML=html;
}

// PROFILE
async function loadProfile(){
 let snap=await getDocs(collection(db,"posts"));
 let u=await getDoc(doc(db,"users",user));

 let followers=u.data().followers||[];

 profileName.innerText=user;
 followerCount.innerText="Followers: "+followers.length;

 let html="";
 let count=0;

 snap.forEach(d=>{
  let p=d.data();
  if(p.user===user){
   count++;
   html+=`<div class="card">${p.text}</div>`;
  }
 });

 postCount.innerText="Posts: "+count;
 profilePosts.innerHTML=html;
}

// NOTIFICATIONS
async function loadNotifications(){
 let snap=await getDocs(collection(db,"notifications"));
 let html="";

 snap.forEach(d=>{
  let n=d.data();
  if(n.to===user){
   html+=`<div class="card">${n.text}</div>`;
  }
 });

 notifications.innerHTML=html||"No notifications";
}

</script>

</body>
</html>
