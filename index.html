<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(180deg,#021a02,#063d06);
 color:white;
}

.card{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 border-radius:15px;
 padding:15px;
 margin:10px;
}

input{
 width:80%;
 padding:12px;
 border-radius:20px;
 border:none;
 background:#123812;
 color:white;
 margin:5px;
 font-size:16px;
}

button{
 background:#00c853;
 border:none;
 padding:10px;
 border-radius:20px;
 color:white;
}

img,video{
 width:100%;
 border-radius:10px;
 margin-top:10px;
}

.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#0c2b0c;
 display:flex;
 justify-content:space-around;
 padding:10px;
}

#main{padding-bottom:70px;}
</style>
</head>

<body>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div id="feed">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining</button>
</div>

<div class="card">
⚡ Level: <span id="mineLevel">1</span>
<button onclick="upgradeMining()">Upgrade</button>
</div>

<div class="card">
🏆 Leaderboard
<div id="leaderboard"></div>
</div>

<div class="card">
🎁 Daily Bonus  
🔥 Streak: <span id="streak">0</span><br>
<button onclick="claimBonus()">Claim</button>
</div>

<input id="postText">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<!-- REELS -->
<div id="reels" style="display:none">

<div class="card">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
</div>

<div id="reelPlayer" class="card"></div>

<div style="text-align:center">
<button onclick="prevReel()">⬆️</button>
<button onclick="nextReel()">⬇️</button>
</div>

</div>

</div>

<div class="bottom">
<button onclick="showFeed()">🏠</button>
<button onclick="showReels()">🎥</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="";
let reelsList=[];
let currentReel=0;
let watchTimer=null;

/* LOGIN */
window.login=async()=>{
 user=username.value.trim();
 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   miningStart:Date.now(),
   mineLevel:1,
   streak:0,
   lastClaim:0,
   reelToday:0,
   likeToday:0,
   lastReset:Date.now()
  });
 }

 let d=(await getDoc(ref)).data();

 // RESET DAILY LIMIT
 if(Date.now()-d.lastReset>86400000){
  await updateDoc(ref,{
   reelToday:0,
   likeToday:0,
   lastReset:Date.now()
  });
 }

 loginBox.style.display="none";
 main.style.display="block";

 loadCoins();
 loadLevel();
 loadLeaderboard();
 loadBonus();
 loadPosts();
 loadReels();

 setInterval(loadCoins,1000);
};

/* NAV */
window.showFeed=()=>{feed.style.display="block";reels.style.display="none";}
window.showReels=()=>{reels.style.display="block";feed.style.display="none";}

/* MINING */
window.startMining=async()=>{
 await updateDoc(doc(db,"users",user),{miningStart:Date.now()});
};

async function loadCoins(){
 let d=(await getDoc(doc(db,"users",user))).data();

 let sec=(Date.now()-d.miningStart)/1000;
 let speed=(20+(d.mineLevel-1)*4)/86400;

 let total=(d.coins||0)+(sec*speed);

 await updateDoc(doc(db,"users",user),{
  coins:total,
  miningStart:Date.now()
 });

 coinBal.innerText=total.toFixed(5);
}

/* LEVEL */
async function loadLevel(){
 let d=(await getDoc(doc(db,"users",user))).data();
 mineLevel.innerText=d.mineLevel;
}

/* LEADERBOARD */
function loadLeaderboard(){
 onSnapshot(collection(db,"users"),snap=>{
  let arr=[];
  snap.forEach(d=>arr.push({n:d.id,c:d.data().coins||0}));
  arr.sort((a,b)=>b.c-a.c);

  leaderboard.innerHTML=arr.slice(0,5)
   .map((u,i)=>`${i+1}. ${u.n} - ${u.c.toFixed(5)}`)
   .join("<br>");
 });
}

/* BONUS */
async function loadBonus(){
 let d=(await getDoc(doc(db,"users",user))).data();
 streak.innerText=d.streak;
}

window.claimBonus=async()=>{
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 if(Date.now()-d.lastClaim<86400000)return alert("Wait");

 let s=(d.streak||0)+1;
 if(s>30)s=1;

 await updateDoc(ref,{
  coins:d.coins+(s*0.1),
  streak:s,
  lastClaim:Date.now()
 });

 loadBonus();
};

/* POSTS */
window.addPost=async()=>{
 let text=postText.value;
 let f=file.files[0];

 if(f){
  let r=new FileReader();
  r.onload=()=>addDoc(collection(db,"posts"),{user,text,image:r.result});
  r.readAsDataURL(f);
 }else{
  addDoc(collection(db,"posts"),{user,text});
 }
};

/* LOAD POSTS */
function loadPosts(){
 onSnapshot(collection(db,"posts"),snap=>{
  let html="";
  snap.forEach(d=>{
   let p=d.data();
   html+=`<div class="card">${p.user}<p>${p.text}</p>${p.image?`<img src="${p.image}">`:""}</div>`;
  });
  posts.innerHTML=html;
 });
}

/* REELS */
window.uploadReel=async()=>{
 let f=reelFile.files[0];
 let r=new FileReader();
 r.onload=()=>addDoc(collection(db,"reels"),{user,video:r.result});
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),snap=>{
  reelsList=[];
  snap.forEach(d=>reelsList.push({id:d.id,...d.data()}));
  showReel(0);
 });
}

function showReel(i){
 if(reelsList.length===0)return;

 currentReel=i;
 let r=reelsList[i];

 reelPlayer.innerHTML=`
 <video src="${r.video}" autoplay controls></video>
 <p>${r.user}</p>
 <button onclick="likeReel('${r.id}')">❤️</button>
 `;

 startWatch();
}

window.nextReel=()=>{if(currentReel<reelsList.length-1)showReel(currentReel+1);}
window.prevReel=()=>{if(currentReel>0)showReel(currentReel-1);}

/* WATCH EARNING */
function startWatch(){
 if(watchTimer)clearInterval(watchTimer);

 watchTimer=setInterval(async()=>{
  let ref=doc(db,"users",user);
  let d=(await getDoc(ref)).data();

  if(d.reelToday>=1)return;

  await updateDoc(ref,{
   coins:d.coins+0.005,
   reelToday:d.reelToday+0.005
  });

 },5000);
}

/* LIKE */
window.likeReel=async()=>{
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 if(d.likeToday>=0.1)return alert("Limit");

 await updateDoc(ref,{
  coins:d.coins+0.002,
  likeToday:d.likeToday+0.002
 });
};

</script>

</body>
</html>
