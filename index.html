<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #0b1d0b, #020402);
  color: white;
  margin: 0;
}

h1 {
  background: #0f2f0f;
  padding: 15px;
  margin: 0;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 12px;
  border: none;
  background: #1a2e1a;
  color: white;
}

button {
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, #00c853, #64dd17);
  margin: 5px;
}

.card {
  background: #1a2e1a;
  margin: 10px;
  padding: 12px;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
}

.nav {
  text-align: center;
}

#chatBox {
  max-height: 300px;
  overflow-y: scroll;
}
</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div id="loginPage">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="appPage" style="display:none;">

<h2 id="welcome"></h2>

<div class="nav">
<button onclick="showFeed()">🌍 Feed</button>
<button onclick="showProfile()">👤 Profile</button>
<button onclick="showChat()">💬 Chat</button>
<button onclick="logout()">Logout</button>
</div>

<!-- FEED -->
<div id="feedSection">
<input id="text" placeholder="Share something...">
<input type="file" id="imageInput">
<button onclick="post()">Post</button>
<div id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none;">
<input id="bioInput" placeholder="Write bio">
<button onclick="saveBio()">Save</button>
<p id="bioText"></p>
<div id="myPosts"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">
<h3>💬 Global Chat</h3>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
  authDomain: "nature-connect-a1592.firebaseapp.com",
  projectId: "nature-connect-a1592",
  storageBucket: "nature-connect-a1592.firebasestorage.app",
  messagingSenderId: "734768119211",
  appId: "1:734768119211:web:7633f476bc22d8d552e6ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("user") || "";

if(user) showApp();

window.login = function(){
 user=document.getElementById("username").value.trim();
 localStorage.setItem("user",user);
 showApp();
}

window.logout=function(){
 localStorage.removeItem("user");
 location.reload();
}

function showApp(){
 document.getElementById("loginPage").style.display="none";
 document.getElementById("appPage").style.display="block";
 document.getElementById("welcome").innerText="Welcome "+user;
 load();
 loadProfile();
}

window.showFeed=function(){
 document.getElementById("feedSection").style.display="block";
 document.getElementById("profileSection").style.display="none";
 document.getElementById("chatSection").style.display="none";
}

window.showProfile=function(){
 document.getElementById("feedSection").style.display="none";
 document.getElementById("profileSection").style.display="block";
 document.getElementById("chatSection").style.display="none";
 loadProfile();
}

window.showChat=function(){
 document.getElementById("feedSection").style.display="none";
 document.getElementById("profileSection").style.display="none";
 document.getElementById("chatSection").style.display="block";
 loadChat();
}

// POST
window.post=async function(){
 let text=document.getElementById("text").value.trim();
 let file=document.getElementById("imageInput").files[0];

 let image=null;

 if(file){
  image=await new Promise(resolve=>{
   let img=new Image();
   let reader=new FileReader();
   reader.onload=e=>img.src=e.target.result;

   img.onload=function(){
    let canvas=document.createElement("canvas");
    let ctx=canvas.getContext("2d");
    let w=600;
    let scale=w/img.width;

    canvas.width=w;
    canvas.height=img.height*scale;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    resolve(canvas.toDataURL("image/jpeg",0.7));
   };

   reader.readAsDataURL(file);
  });
 }

 await addDoc(collection(db,"posts"),{
  user,text,image,likes:0,comments:[]
 });

 document.getElementById("text").value="";
 load();
}

// LIKE
window.likePost=async function(id,likes){
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 load();
}

// COMMENT
window.addComment=async function(id,comments){
 let input=document.getElementById("comment-"+id);
 let text=input.value.trim();
 if(!text)return;

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{comments});
 load();
}

// LOAD FEED
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`<div class="card">
  <b>${p.user}</b>
  ${p.text?`<p>${p.text}</p>`:""}
  ${p.image?`<img src="${p.image}">`:""}
  ❤️ ${p.likes}
  <button onclick="likePost('${id}',${p.likes})">Like</button>
  ${(p.comments||[]).map(c=>`<div>${c}</div>`).join("")}
  <input id="comment-${id}">
  <button onclick="addComment('${id}',${JSON.stringify(p.comments||[])})">Send</button>
  </div>`;
 });

 document.getElementById("feed").innerHTML=html;
}

// PROFILE
window.saveBio=async function(){
 let bio=document.getElementById("bioInput").value;
 await setDoc(doc(db,"users",user),{bio});
 loadProfile();
}

async function loadProfile(){
 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(snap.exists()){
  document.getElementById("bioText").innerText=snap.data().bio;
 }

 let posts=await getDocs(collection(db,"posts"));
 let html="";

 posts.forEach(d=>{
  let p=d.data();
  if(p.user===user){
   html+=`<div class="card">${p.text||""}${p.image?`<img src="${p.image}">`:""}</div>`;
  }
 });

 document.getElementById("myPosts").innerHTML=html;
}

// CHAT
window.sendMessage=async function(){
 let msg=document.getElementById("chatInput").value;
 if(!msg)return;

 await addDoc(collection(db,"chat"),{
  user,message:msg
 });

 document.getElementById("chatInput").value="";
 loadChat();
}

async function loadChat(){
 let snap=await getDocs(collection(db,"chat"));
 let html="";

 snap.forEach(d=>{
  let m=d.data();
  html+=`<div class="card"><b>${m.user}</b>: ${m.message}</div>`;
 });

 document.getElementById("chatBox").innerHTML=html;
}

</script>

</body>
</html>
