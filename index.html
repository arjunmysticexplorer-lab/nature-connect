<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
 body {
   font-family: Arial;
   background: linear-gradient(to bottom, #0b1d0b, #1f3d1f);
   color: white;
   margin: 0;
   text-align: center;
 }

 h1 {
   background: black;
   padding: 15px;
   margin: 0;
 }

 .container {
   padding: 20px;
 }

 input {
   padding: 10px;
   width: 80%;
   margin: 5px;
   border-radius: 10px;
   border: none;
 }

 button {
   padding: 10px 20px;
   margin: 10px;
   border: none;
   border-radius: 20px;
   background: green;
   color: white;
   font-weight: bold;
 }

 .card {
   background: #1a2e1a;
   padding: 15px;
   margin: 10px;
   border-radius: 15px;
 }

 img {
   width: 100%;
   border-radius: 10px;
   margin-top: 10px;
 }
</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div class="container" id="loginPage">
<h2>Login</h2>
<input id="username" placeholder="Enter your name" />
<br>
<button onclick="login()">Enter</button>
</div>

<div class="container" id="appPage" style="display:none;">

<h2 id="welcome"></h2>

<input id="text" placeholder="Share your moment..." />
<br>

<input type="file" id="imageInput" accept="image/*" />
<br>

<button onclick="post()">Post</button>
<button onclick="logout()">Logout</button>

<h2>🌍 Global Feed</h2>
<div id="feed"></div>

</div>

<script>

let currentUser = localStorage.getItem("user") || ""

if(currentUser){
 showApp()
}

function login(){
 let name = document.getElementById("username").value.trim()
 if(name){
  currentUser = name
  localStorage.setItem("user", name)
  showApp()
 }
}

function logout(){
 localStorage.removeItem("user")
 location.reload()
}

// GLOBAL POSTS
function getPosts(){
 return JSON.parse(localStorage.getItem("global_posts")) || []
}

function savePosts(posts){
 localStorage.setItem("global_posts", JSON.stringify(posts))
}

function post(){
 let text = document.getElementById("text").value.trim()
 let file = document.getElementById("imageInput").files[0]

 if(!text && !file){
   alert("Write something or select image")
   return
 }

 let posts = getPosts()

 if(file){
   let reader = new FileReader()

   reader.onload = function(e){
     let postData = {
       user: currentUser,
       text: text,
       image: e.target.result
     }

     posts.unshift(postData)
     savePosts(posts)
     render(posts)
   }

   reader.onerror = function(){
     alert("Image load failed ❌")
   }

   reader.readAsDataURL(file)

 } else {
   let postData = {
     user: currentUser,
     text: text,
     image: null
   }

   posts.unshift(postData)
   savePosts(posts)
   render(posts)
 }

 document.getElementById("text").value = ""
 document.getElementById("imageInput").value = ""
}

function render(posts){
 let html = ""

 posts.forEach(p=>{
   html += "<div class='card'>"
   html += "<b>👤 " + p.user + "</b>"
   if(p.text) html += "<p>" + p.text + "</p>"
   if(p.image) html += "<img src='" + p.image + "'/>"
   html += "</div>"
 })

 document.getElementById("feed").innerHTML = html
}

function showApp(){
 document.getElementById("loginPage").style.display = "none"
 document.getElementById("appPage").style.display = "block"
 document.getElementById("welcome").innerText = "Welcome " + currentUser
 render(getPosts())
}

</script>

</body>
</html>
