<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(180deg,#021a02,#063d06);
 color:white;
}

/* GLASS CARD */
.card{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 border-radius:15px;
 padding:15px;
 margin:10px;
 box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* INPUT */
input{
 width:80%;
 padding:12px;
 border-radius:20px;
 border:none;
 background:#123812;
 color:white;
 margin:5px;
 font-size:16px;
}

/* BUTTON */
button{
 background:#00c853;
 border:none;
 padding:10px;
 border-radius:20px;
 color:white;
}

/* MEDIA */
img,video{
 width:100%;
 border-radius:10px;
 margin-top:10px;
}

/* BOTTOM NAV */
.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#0c2b0c;
 display:flex;
 justify-content:space-around;
 padding:10px;
}

#main{
 padding-bottom:70px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div id="feed">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining (24h)</button>
</div>

<div class="card">
⚡ Level: <span id="mineLevel">1</span>
<button onclick="upgradeMining()">Upgrade</button>
</div>

<div class="card">
🏆 Leaderboard
<div id="leaderboard"></div>
</div>

<div class="card">
🎁 Daily Bonus  
🔥 Streak: <span id="streak">0</span><br>
<button onclick="claimBonus()">Claim</button>
</div>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<div id="profile" style="display:none">
<h2 id="pname"></h2>
</div>

<div id="notify" style="display:none"></div>

<div id="chat" style="display:none">
<input id="chatUser">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<div id="reels" style="display:none">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
<div id="reelBox"></div>
</div>

</div>

<div class="bottom">
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",chatUser="";

/* LOGIN FIXED */
window.login=async()=>{
 user=username.value.trim();
 if(!user)return;

 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   miningStart:Date.now(),
   mineLevel:1,
   online:true,
   streak:0,
   lastClaim:0
  });
 }else{
  let d=snap.data();

  await updateDoc(ref,{
   coins:d.coins ?? 0,
   miningStart:d.miningStart ?? Date.now(),
   mineLevel:d.mineLevel ?? 1,
   online:true,
   streak:d.streak ?? 0,
   lastClaim:d.lastClaim ?? 0
  });
 }

 loginBox.style.display="none";
 main.style.display="block";

 loadPosts();
 loadCoins();
 loadLevel();
 loadLeaderboard();
 loadBonus();

 setInterval(loadCoins,1000);
};

/* NAV */
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showProfile=()=>{profile.style.display="block";feed.style.display="none";pname.innerText=user;}
window.showNotifications=()=>{notify.style.display="block";feed.style.display="none";}
window.showChat=()=>{chat.style.display="block";feed.style.display="none";}
window.showReels=()=>{reels.style.display="block";feed.style.display="none";}

/* MINING */
window.startMining=async()=>{
 let ref=doc(db,"users",user);
 await updateDoc(ref,{miningStart:Date.now()});
};

/* COINS FIXED */
async function loadCoins(){
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 let coins = Number(d.coins || 0);
 let start = Number(d.miningStart || Date.now());
 let level = Number(d.mineLevel || 1);

 let sec = (Date.now()-start)/1000;
 let speed = (20+(level-1)*4)/86400;

 let total = coins + (sec*speed);
 if(isNaN(total)) total = coins;

 await updateDoc(ref,{
  coins: total,
  miningStart: Date.now()
 });

 coinBal.innerText = total.toFixed(5);
}

/* LEVEL */
async function loadLevel(){
 let d=(await getDoc(doc(db,"users",user))).data();
 mineLevel.innerText=d.mineLevel||1;
}

/* ONLINE STATUS FIX */
function loadPosts(){
 onSnapshot(collection(db,"posts"),async snap=>{
  let html="";

  for(const d of snap.docs){
   let p=d.data();

   let u=(await getDoc(doc(db,"users",p.user))).data();
   let online=u?.online;

   html+=`
   <div class="card">
   <b>${p.user} ${online?"🟢":"⚫"}</b>
   <p>${p.text||""}</p>
   ${p.image?`<img src="${p.image}">`:""}
   ❤️ ${p.likes||0}
   <button onclick="like('${d.id}',${p.likes||0})">Like</button>
   <div>${(p.comments||[]).join("<br>")}</div>
   <input id="c-${d.id}">
   <button onclick="sendComment('${d.id}')">Send</button>
   </div>`;
  }

  posts.innerHTML=html;
 });
}

/* LIKE */
window.like=async(id,l)=>updateDoc(doc(db,"posts",id),{likes:l+1});

/* COMMENT */
window.sendComment=async(id)=>{
 let i=document.getElementById("c-"+id);
 let t=i.value;
 if(!t)return;

 let ref=doc(db,"posts",id);
 let d=(await getDoc(ref)).data();
 let c=d.comments||[];

 c.push(user+": "+t);
 await updateDoc(ref,{comments:c});
 i.value="";
};

/* LEADERBOARD */
function loadLeaderboard(){
 onSnapshot(collection(db,"users"),snap=>{
  let arr=[];
  snap.forEach(d=>{
   arr.push({n:d.id,c:d.data().coins||0});
  });
  arr.sort((a,b)=>b.c-a.c);

  leaderboard.innerHTML=arr.slice(0,5)
   .map((u,i)=>`${i+1}. ${u.n} - ${u.c.toFixed(5)}`)
   .join("<br>");
 });
}

/* BONUS */
async function loadBonus(){
 let d=(await getDoc(doc(db,"users",user))).data();
 streak.innerText=d.streak||0;
}

window.claimBonus=async()=>{
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 let now=Date.now();
 if(now-(d.lastClaim||0)<86400000)return alert("Wait 24h");

 let s=(d.streak||0)+1;
 if(s>30)s=1;

 let bonus=s*0.1;

 await updateDoc(ref,{
  coins:d.coins+bonus,
  streak:s,
  lastClaim:now
 });

 loadBonus();
};

</script>

</body>
</html>
