<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
 body {
   font-family: Arial;
   background: linear-gradient(to bottom, #0b1d0b, #1f3d1f);
   color: white;
   text-align: center;
 }

 input, button {
   padding: 10px;
   margin: 5px;
   border-radius: 10px;
 }

 .card {
   background: #1a2e1a;
   margin: 10px;
   padding: 10px;
   border-radius: 10px;
 }

 img {
   width: 100%;
   margin-top: 10px;
 }
</style>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
  authDomain: "nature-connect-a1592.firebaseapp.com",
  projectId: "nature-connect-a1592",
  storageBucket: "nature-connect-a1592.firebasestorage.app",
  messagingSenderId: "734768119211",
  appId: "1:734768119211:web:7633f476bc22d8d552e6ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 Firebase functions
window.addPost = async function(post){
  await addDoc(collection(db, "posts"), post);
}

window.getPosts = async function(){
  let snapshot = await getDocs(collection(db, "posts"));
  let data = [];
  snapshot.forEach(doc => data.push(doc.data()));
  return data;
}
</script>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div id="loginPage">
<input id="username" placeholder="Enter name"/>
<button onclick="login()">Login</button>
</div>

<div id="appPage" style="display:none;">

<h2 id="welcome"></h2>

<input id="text" placeholder="Write something"/>
<input type="file" id="imageInput"/>
<br>
<button onclick="post()">Post</button>

<div id="feed"></div>

<h2>AI 🤖</h2>
<input id="aiInput">
<button onclick="ai()">Ask</button>
<p id="aiOut"></p>

</div>

<script>

let user = localStorage.getItem("user") || ""

if(user){
 showApp()
}

function login(){
 user = document.getElementById("username").value
 localStorage.setItem("user", user)
 showApp()
}

function showApp(){
 document.getElementById("loginPage").style.display="none"
 document.getElementById("appPage").style.display="block"
 document.getElementById("welcome").innerText="Welcome "+user
 load()
}

// 🔥 FIXED POST FUNCTION
async function post(){
 let text = document.getElementById("text").value
 let file = document.getElementById("imageInput").files[0]

 if(!text && !file){
   alert("Write something or select image")
   return
 }

 let image = null

 if(file){
   image = await new Promise((resolve)=>{
     let reader = new FileReader()
     reader.onload = (e)=> resolve(e.target.result)
     reader.readAsDataURL(file)
   })
 }

 await addPost({
   user: user,
   text: text,
   image: image
 })

 load()

 document.getElementById("text").value=""
 document.getElementById("imageInput").value=""
}

async function load(){
 let posts = await getPosts()
 let html = ""

 posts.reverse().forEach(p=>{
   html += "<div class='card'>"
   html += "<b>"+p.user+"</b>"
   if(p.text) html += "<p>"+p.text+"</p>"
   if(p.image) html += "<img src='"+p.image+"'/>"
   html += "</div>"
 })

 document.getElementById("feed").innerHTML = html
}

function ai(){
 let input=document.getElementById("aiInput").value.toLowerCase()
 let out=""

 if(input.includes("hello")) out="Hello "+user
 else out="I am your AI 🤖"

 document.getElementById("aiOut").innerText=out
}

</script>

</body>
</html>
