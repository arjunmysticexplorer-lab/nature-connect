<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(120deg,#3ec6d3,#5fd3a3,#fce38a);
 color:#003b2f;
}

.card{
 background:rgba(0,0,0,0.5);
 color:white;
 padding:15px;
 margin:10px;
 border-radius:15px;
}

button{
 background:#00ff88;
 border:none;
 padding:10px 15px;
 border-radius:20px;
 font-weight:bold;
}

input{
 width:80%;
 padding:10px;
 border-radius:20px;
 border:none;
 margin:5px;
}

.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#000;
 display:flex;
 justify-content:space-around;
 padding:10px;
}

</style>
</head>

<body>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining (24h)</button>
</div>

<div class="card">
💼 Wallet: <span id="walletBal">0.00000</span>
</div>

<div class="card">
🟢 Status: <span id="status">Offline</span>
</div>

<input id="postText" placeholder="Write post">
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<div class="bottom">
<button onclick="location.reload()">🏠</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="";

/* LOGIN */
window.login=async()=>{
 user=username.value.trim();
 if(!user) return;

 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   wallet:0,
   miningStart:0,
   miningActive:false,
   online:true
  });
 }else{
  await updateDoc(ref,{online:true});
 }

 status.innerText="Online";

 loginBox.style.display="none";
 main.style.display="block";

 loadUser();
};

/* START MINING */
window.startMining=async()=>{
 let ref=doc(db,"users",user);

 await updateDoc(ref,{
  miningStart:Date.now(),
  miningActive:true
 });
};

/* AUTO MINING (24H SYSTEM) */
async function updateMining(){

 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 if(!d.miningActive) return;

 let now=Date.now();
 let start=d.miningStart || now;

 let coins=d.coins || 0;

 let diff=(now - start)/1000;

 let rate=20/86400; // 20 QNC per 24h

 let earned=diff * rate;

 let newCoins=coins + earned;

 await updateDoc(ref,{
  coins:newCoins,
  miningStart:now
 });

 coinBal.innerText=newCoins.toFixed(5);
}

/* RUN EVERY SECOND */
setInterval(updateMining,1000);

/* LOAD USER */
function loadUser(){
 let ref=doc(db,"users",user);

 onSnapshot(ref,(snap)=>{
  let d=snap.data();

  coinBal.innerText=(d.coins||0).toFixed(5);
  walletBal.innerText=(d.wallet||0).toFixed(5);
 });
}

/* POSTS */
window.addPost=async()=>{
 addDoc(collection(db,"posts"),{
  user,
  text:postText.value,
  likes:0,
  comments:[]
 });
};

onSnapshot(collection(db,"posts"),snap=>{
 let html="";
 snap.forEach(d=>{
  let p=d.data();

  html+=`
  <div class="card">
  <b>${p.user}</b>
  <p>${p.text}</p>

  ❤️ ${p.likes}
  <button onclick="likePost('${d.id}',${p.likes})">Like</button>

  ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}

  <input id="c-${d.id}">
  <button onclick="comment('${d.id}')">Send</button>
  </div>
  `;
 });

 posts.innerHTML=html;
});

/* LIKE */
window.likePost=async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{
  likes:likes+1
 });
};

/* COMMENT */
window.comment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value;

 let ref=doc(db,"posts",id);
 let d=(await getDoc(ref)).data();

 let c=d.comments||[];
 c.push(user+": "+text);

 await updateDoc(ref,{comments:c});

 input.value="";
};

</script>

</body>
</html>
