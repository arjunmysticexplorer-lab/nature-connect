<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: Arial;
  background: #0b1d0b;
  color: white;
  margin: 0;
  padding-bottom: 200px; /* 🔥 keyboard space */
}

h1 {
  background: #0f2f0f;
  padding: 12px;
  margin: 0;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 12px;
  border: none;
  font-size:16px; /* 🔥 iPhone fix */
}

button {
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #00c853;
  margin: 5px;
}

.card {
  background: #1a2e1a;
  margin: 10px;
  padding: 12px;
  border-radius: 15px;
}

.nav {
  text-align: center;
}

#chatBox {
  max-height: 300px;
  overflow-y: scroll;
}
</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div id="loginPage">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="appPage" style="display:none;">

<h2 id="welcome"></h2>

<div class="nav">
<button onclick="showFeed()">Feed</button>
<button onclick="showChat()">Chat</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="logout()">Logout</button>
</div>

<!-- FEED -->
<div id="feedSection">
<input id="text" placeholder="Write post">
<button onclick="post()">Post</button>
<div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendMessage()">Send</button>
</div>

<!-- NOTIFICATIONS -->
<div id="notifSection" style="display:none;">
<div id="notifBox"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user = localStorage.getItem("user") || "";

if(user) showApp();

// LOGIN
window.login=()=>{
 user=document.getElementById("username").value.trim();
 if(!user) return alert("Enter name");
 localStorage.setItem("user",user);
 showApp();
}

window.logout=()=>{
 localStorage.removeItem("user");
 location.reload();
}

function showApp(){
 document.getElementById("loginPage").style.display="none";
 document.getElementById("appPage").style.display="block";
 document.getElementById("welcome").innerText="Welcome "+user;
 load();
}

// NAV
window.showFeed=()=>{
 document.getElementById("feedSection").style.display="block";
 document.getElementById("chatSection").style.display="none";
 document.getElementById("notifSection").style.display="none";
}

window.showChat=()=>{
 document.getElementById("feedSection").style.display="none";
 document.getElementById("chatSection").style.display="block";
 document.getElementById("notifSection").style.display="none";
 loadChat();
}

window.showNotifications=()=>{
 document.getElementById("feedSection").style.display="none";
 document.getElementById("chatSection").style.display="none";
 document.getElementById("notifSection").style.display="block";
 loadNotifications();
}

// POST
window.post=async()=>{
 let text=document.getElementById("text").value.trim();
 if(!text) return;

 await addDoc(collection(db,"posts"),{
  user,text,likes:0,comments:[]
 });

 document.getElementById("text").value="";
 load();
}

// LIKE
window.likePost=async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 await addDoc(collection(db,"notifications"),{text:user+" liked a post"});
 load();
}

// 🔥 COMMENT FINAL FIX
window.addComment=async(id)=>{
 let input=document.getElementById("comment-"+id);
 let text=input.value.trim();
 if(!text) return;

 let snap=await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id){
    comments=d.data().comments || [];
  }
 });

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{comments});

 await addDoc(collection(db,"notifications"),{
  text:user+" commented: "+text
 });

 input.value="";
 load();
}

// LOAD FEED
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`<div class="card">
  <b>${p.user}</b>
  <p>${p.text}</p>

  ❤️ ${p.likes}
  <button onclick="likePost('${id}',${p.likes})">Like</button>

  ${(p.comments||[]).map(c=>`<div>${c}</div>`).join("")}

  <input id="comment-${id}" placeholder="Write comment...">
  <button onclick="addComment('${id}')">Send</button>
  </div>`;
 });

 document.getElementById("feed").innerHTML=html;
}

// CHAT
window.sendMessage=async()=>{
 let msg=document.getElementById("chatInput").value.trim();
 if(!msg) return;

 await addDoc(collection(db,"chat"),{
  user,message:msg
 });

 document.getElementById("chatInput").value="";
 loadChat();
}

async function loadChat(){
 let snap=await getDocs(collection(db,"chat"));
 let html="";
 snap.forEach(d=>{
  let m=d.data();
  html+=`<div class="card">${m.user}: ${m.message}</div>`;
 });
 document.getElementById("chatBox").innerHTML=html;

 let box=document.getElementById("chatBox");
 box.scrollTop=box.scrollHeight;
}

// NOTIFICATIONS
async function loadNotifications(){
 let snap=await getDocs(collection(db,"notifications"));
 let html="";
 snap.forEach(d=>{
  html+=`<div class="card">${d.data().text}</div>`;
 });
 document.getElementById("notifBox").innerHTML=html;
}

// 🔄 AUTO REFRESH
setInterval(()=>{
 load();
 loadChat();
},3000);

// 🔥 KEYBOARD FIX FINAL
document.addEventListener("focusin",(e)=>{
 if(e.target.tagName==="INPUT"){
  setTimeout(()=>{
    e.target.scrollIntoView({behavior:"smooth",block:"center"});
  },400);
 }
});

</script>

</body>
</html>
