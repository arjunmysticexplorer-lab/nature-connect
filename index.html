<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;padding:12px;background:#0c2b0c;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;margin:2px;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
.card{background:#1b3b1b;padding:15px;border-radius:15px;margin:10px;}
img,video{width:100%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<!-- FEED -->
<div id="feed">

<div class="card">
💰 QNC Balance: <span id="coinBal">0</span><br><br>
<button onclick="startMining()">⛏️ Start Mining</button>
</div>

<!-- WALLET -->
<div class="card">
<h3>💰 QNC Wallet</h3>
<input id="sendUser" placeholder="Send to user">
<input id="sendAmount" type="number" placeholder="Amount">
<button onclick="sendCoins()">Send QNC</button>
</div>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
<h2 id="pname"></h2>
</div>

<!-- NOTIFY -->
<div id="notify" style="display:none">
<h2>Notifications</h2>
<div id="note"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<input id="chatUser" placeholder="Enter user">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<!-- REELS -->
<div id="reels" style="display:none">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload Reel</button>
<div id="reelBox"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",currentChatUser="";

// LOGIN
window.login=async()=>{
 user=username.value.trim();
 if(!user) return alert("Enter name");

 await setDoc(doc(db,"users",user),{
  coins:0,
  lastMine:0,
  online:true
 },{merge:true});

 loginBox.style.display="none";
 main.style.display="block";

 load();
 loadCoins();
 loadReels();
};

// OFFLINE
window.addEventListener("beforeunload",async()=>{
 if(user){
  await updateDoc(doc(db,"users",user),{online:false});
 }
});

// COINS
async function loadCoins(){
 let u=await getDoc(doc(db,"users",user));
 coinBal.innerText=u.data()?.coins||0;
}

// MINING
window.startMining=async()=>{
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 if(Date.now()-(data.lastMine||0)<86400000){
  alert("Come after 24h");
  return;
 }

 await updateDoc(ref,{
  coins:(data.coins||0)+10,
  lastMine:Date.now()
 });

 loadCoins();
};

// WALLET SEND
window.sendCoins=async()=>{
 let toUser=sendUser.value.trim();
 let amount=parseInt(sendAmount.value);

 if(!toUser||!amount) return alert("Enter details");

 let sRef=doc(db,"users",user);
 let rRef=doc(db,"users",toUser);

 let sData=(await getDoc(sRef)).data();

 if((sData.coins||0)<amount){
  alert("Not enough QNC");
  return;
 }

 await updateDoc(sRef,{coins:sData.coins-amount});

 let rSnap=await getDoc(rRef);
 if(rSnap.exists()){
  let rData=rSnap.data();
  await updateDoc(rRef,{coins:(rData.coins||0)+amount});
 }else{
  alert("User not found");
  return;
 }

 loadCoins();
 alert("Sent!");
};

// NAV
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showProfile=()=>{feed.style.display="none";profile.style.display="block";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showNotifications=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="block";chat.style.display="none";reels.style.display="none";}
window.showChat=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="block";reels.style.display="none";}
window.showReels=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="block";}

// POST
window.addPost=async()=>{
 let text=postText.value;
 let f=file.files[0];

 if(f){
  let r=new FileReader();
  r.onload=async()=>{
   await addDoc(collection(db,"posts"),{
    user,text,image:r.result,likes:0,comments:[]
   });
   reward(10);
  };
  r.readAsDataURL(f);
 }else{
  await addDoc(collection(db,"posts"),{
   user,text,image:"",likes:0,comments:[]
  });
  reward(10);
 }
};

// LIKE
window.like=async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 reward(1);
};

// COMMENT
window.sendComment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text) return;

 let ref=doc(db,"posts",id);
 let snap=await getDoc(ref);
 let comments=snap.data().comments||[];

 comments.push(user+": "+text);
 await updateDoc(ref,{comments});

 input.value="";
 reward(2);
};

// REWARD
async function reward(val){
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();
 await updateDoc(ref,{coins:(data.coins||0)+val});
 loadCoins();
}

// FEED
function load(){
 onSnapshot(collection(db,"posts"),async s=>{
  let html="";

  for(const d of s.docs){
   let p=d.data();
   let uDoc=await getDoc(doc(db,"users",p.user));
   let online=uDoc.data()?.online;

   html+=`
   <div class="card">
   <b>${p.user} ${online?"🟢":"⚫"}</b>
   <p>${p.text||""}</p>
   ${p.image?`<img src="${p.image}">`:""}
   ❤️ ${p.likes||0}
   <button onclick="like('${d.id}',${p.likes||0})">Like</button>

   <div>${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}</div>

   <input id="c-${d.id}">
   <button onclick="sendComment('${d.id}')">Send</button>
   </div>
   `;
  }

  posts.innerHTML=html;
 });
}

// CHAT
window.openChat=()=>{currentChatUser=chatUser.value;}
window.sendMsg=async()=>{
 await addDoc(collection(db,"messages"),{from:user,to:currentChatUser,text:msg.value});
 msg.value="";
 loadChat();
};

function loadChat(){
 onSnapshot(collection(db,"messages"),s=>{
  let h="";
  s.forEach(d=>{
   let m=d.data();
   if(m.from===user||m.to===user) h+=`<div>${m.text}</div>`;
  });
  chatBox.innerHTML=h;
 });
}

// REELS
window.uploadReel=async()=>{
 let f=reelFile.files[0];
 if(!f) return;

 let r=new FileReader();
 r.onload=async()=>{
  await addDoc(collection(db,"reels"),{
   user,
   video:r.result
  });
 };
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),s=>{
  let h="";
  s.forEach(d=>{
   let r=d.data();
   h+=`<div class="card"><b>${r.user}</b><video src="${r.video}" controls></video></div>`;
  });
  reelBox.innerHTML=h;
 });
}

</script>

</body>
</html>
