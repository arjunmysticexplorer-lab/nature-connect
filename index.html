<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(90deg,#3ec6d3,#5fd3a3,#fce38a);
}

/* zoom fix */
input{font-size:16px;}

/* UI */
.card{
 background:rgba(0,0,0,0.6);
 color:white;
 margin:10px;
 padding:15px;
 border-radius:15px;
}

button{
 background:#00ff88;
 border:none;
 padding:10px 20px;
 border-radius:20px;
 margin-top:5px;
}

.post{
 background:rgba(0,0,0,0.7);
 margin:10px;
 padding:10px;
 border-radius:10px;
 color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div style="padding:10px;font-weight:bold;">
🌍 Nature Connect
</div>

<!-- LOGIN -->
<div id="loginBox" style="padding:20px;">
<input id="username" placeholder="Enter name">
<br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining</button>
</div>

<div class="card">
💼 Wallet: <span id="walletBal">0.00000</span>
</div>

<div class="card">
🟢 Status: <span id="status">Offline</span>
</div>

<div class="card">
<input id="postText" placeholder="Write post">
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
 getFirestore,collection,addDoc,doc,setDoc,
 getDoc,updateDoc,onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";
let miningInterval=null;

/* LOGIN */
window.login = async ()=>{
 user = document.getElementById("username").value.trim();

 if(!user){
  alert("Enter name");
  return;
 }

 const ref = doc(db,"users",user);
 const snap = await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   wallet:0,
   miningStart:0,
   miningActive:false,
   online:true
  });
 }else{
  await updateDoc(ref,{online:true});
 }

 document.getElementById("loginBox").style.display="none";
 document.getElementById("main").style.display="block";

 document.getElementById("status").innerText="Online";

 loadUser();

 if(!miningInterval){
  miningInterval = setInterval(updateMining,1000);
 }
};

/* START MINING */
window.startMining = async ()=>{
 let ref = doc(db,"users",user);

 await updateDoc(ref,{
  miningStart:Date.now(),
  miningActive:true
 });
};

/* MINING SYSTEM */
async function updateMining(){
 let ref = doc(db,"users",user);
 let snap = await getDoc(ref);
 let d = snap.data();

 if(!d || !d.miningActive) return;

 let now = Date.now();
 let diff = (now - d.miningStart)/1000;

 let rate = 20/86400;
 let earned = diff * rate;

 let newCoins = (d.coins||0) + earned;

 await updateDoc(ref,{
  coins:newCoins,
  miningStart:now
 });
}

/* LOAD USER */
function loadUser(){
 let ref = doc(db,"users",user);

 onSnapshot(ref,(snap)=>{
  let d = snap.data();
  if(!d) return;

  document.getElementById("coinBal").innerText = (d.coins||0).toFixed(5);
  document.getElementById("walletBal").innerText = (d.wallet||0).toFixed(5);
 });
}

/* ADD POST */
window.addPost = async ()=>{
 let text = document.getElementById("postText").value;
 if(!text) return;

 await addDoc(collection(db,"posts"),{
  user,
  text,
  likes:0,
  comments:[]
 });

 document.getElementById("postText").value="";
};

/* LOAD POSTS */
onSnapshot(collection(db,"posts"),snap=>{
 let html="";
 snap.forEach(docu=>{
  let p = docu.data();

  html += `
  <div class="post">
  <b>${p.user}</b>
  <p>${p.text}</p>

  ❤️ ${p.likes||0}
  <button onclick="likePost('${docu.id}',${p.likes||0})">Like</button>

  ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}

  <input id="c-${docu.id}">
  <button onclick="comment('${docu.id}')">Send</button>
  </div>
  `;
 });

 document.getElementById("posts").innerHTML = html;
});

/* LIKE */
window.likePost = async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{
  likes:likes+1
 });
};

/* COMMENT */
window.comment = async(id)=>{
 let input = document.getElementById("c-"+id);
 let text = input.value;

 if(!text) return;

 let ref = doc(db,"posts",id);
 let d = (await getDoc(ref)).data();

 let arr = d.comments||[];
 arr.push(user+": "+text);

 await updateDoc(ref,{comments:arr});

 input.value="";
};

</script>

</body>
</html>
