<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
 body {
   font-family: Arial;
   background: #0b1d0b;
   color: white;
   text-align: center;
 }

 input, button {
   padding: 10px;
   margin: 5px;
 }

 img {
   width: 100%;
   margin-top: 10px;
 }
</style>

</head>

<body>

<h1>Nature Connect</h1>

<input id="text" placeholder="Write something..." />
<br>

<input type="file" id="imageInput" accept="image/*" />
<br>

<button onclick="post()">Post</button>

<div id="feed"></div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || []

show()

function post(){
 let text = document.getElementById("text").value
 let file = document.getElementById("imageInput").files[0]

 if(file){
   let url = URL.createObjectURL(file)  // 🔥 CHANGE HERE

   let post = {
     text: text,
     image: url
   }

   posts.unshift(post)
   localStorage.setItem("posts", JSON.stringify(posts))
   show()

 } else {
   let post = {
     text: text,
     image: null
   }

   posts.unshift(post)
   localStorage.setItem("posts", JSON.stringify(posts))
   show()
 }
}

function show(){
 let html = ""

 posts.forEach(p=>{
   html += "<div>"
   if(p.text) html += "<p>" + p.text + "</p>"
   if(p.image) html += "<img src='"+p.image+"'/>"
   html += "</div><hr>"
 })

 document.getElementById("feed").innerHTML = html
}

</script>

</body>
</html>
