<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;padding:12px;background:#0c2b0c;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;margin:2px;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
.card{background:#1b3b1b;padding:15px;border-radius:15px;margin:10px;}
img,video{width:100%;border-radius:10px;margin-top:10px;}
</style>

</head>
<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<!-- FEED -->
<div id="feed">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br><br>
<button onclick="startMining()">⛏️ Start Mining (24h)</button>
</div>

<div class="card">
<h3>⚡ Upgrade</h3>
<button onclick="upgradeMining()">Upgrade</button>
<p>Level: <span id="mineLevel">1</span></p>
</div>

<div class="card">
<input id="sendUser" placeholder="Send user">
<input id="sendAmount" type="number">
<button onclick="sendCoins()">Send</button>
</div>

<div class="card">
<input id="withdrawAmount" type="number">
<button onclick="withdrawRequest()">Withdraw</button>
<div id="withdrawList"></div>
</div>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
<h2 id="pname"></h2>
</div>

<!-- NOTIFY -->
<div id="notify" style="display:none"></div>

<!-- CHAT -->
<div id="chat" style="display:none">
<input id="chatUser" placeholder="User">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<!-- REELS -->
<div id="reels" style="display:none">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
<div id="reelBox"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",chatUser="";

// LOGIN
window.login=async()=>{
 user=username.value.trim();
 if(!user)return alert("Enter name");

 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{coins:0,miningStart:null,mineLevel:1,online:true});
 }else{
  await updateDoc(ref,{online:true});
 }

 loginBox.style.display="none";
 main.style.display="block";

 load();loadCoins();loadLevel();loadReels();loadWithdraws();
};

// NAV
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showProfile=()=>{profile.style.display="block";feed.style.display="none";pname.innerText=user;}
window.showNotifications=()=>{notify.style.display="block";feed.style.display="none";}
window.showChat=()=>{chat.style.display="block";feed.style.display="none";}
window.showReels=()=>{reels.style.display="block";feed.style.display="none";}

// MINING
window.startMining=async()=>{
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 if(data.miningStart)return alert("Already mining");

 await updateDoc(ref,{miningStart:Date.now()});
};

// COINS
async function loadCoins(){
 let ref=doc(db,"users",user);
 let data=(await getDoc(ref)).data();

 let coins=data.coins||0;
 let start=data.miningStart;

 if(start){
  let sec=Math.floor((Date.now()-start)/1000);
  if(sec>86400)sec=86400;

  let speed=0.01*(data.mineLevel||1);
  let total=coins+(sec*speed);

  await updateDoc(ref,{coins:total,miningStart:null});
  coinBal.innerText=total.toFixed(5);
 }else{
  coinBal.innerText=coins.toFixed(5);
 }
}

// UPGRADE
async function loadLevel(){
 let d=(await getDoc(doc(db,"users",user))).data();
 mineLevel.innerText=d.mineLevel||1;
}

window.upgradeMining=async()=>{
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 let lvl=d.mineLevel||1;
 let cost=lvl*50;

 if(d.coins<cost)return alert("Low balance");

 await updateDoc(ref,{coins:d.coins-cost,mineLevel:lvl+1});

 loadCoins();loadLevel();
};

// WALLET
window.sendCoins=async()=>{
 let to=sendUser.value;
 let amt=parseFloat(sendAmount.value);

 let sRef=doc(db,"users",user);
 let rRef=doc(db,"users",to);

 let s=(await getDoc(sRef)).data();

 if(s.coins<amt)return;

 await updateDoc(sRef,{coins:s.coins-amt});

 let r=(await getDoc(rRef)).data();
 await updateDoc(rRef,{coins:(r.coins||0)+amt});

 loadCoins();
};

// WITHDRAW
window.withdrawRequest=async()=>{
 let amt=parseFloat(withdrawAmount.value);

 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 if(d.coins<amt)return;

 await updateDoc(ref,{coins:d.coins-amt});

 await addDoc(collection(db,"withdraws"),{user,amt,status:"pending"});

 loadCoins();
};

function loadWithdraws(){
 onSnapshot(collection(db,"withdraws"),s=>{
  let h="";
  s.forEach(d=>{
   let w=d.data();
   if(w.user===user)h+=`<div>${w.amt} - ${w.status}</div>`;
  });
  withdrawList.innerHTML=h;
 });
}

// POSTS
window.addPost=async()=>{
 let text=postText.value;
 let f=file.files[0];

 if(f){
  let r=new FileReader();
  r.onload=async()=>{
   await addDoc(collection(db,"posts"),{user,text,image:r.result,likes:0,comments:[]});
  };
  r.readAsDataURL(f);
 }else{
  await addDoc(collection(db,"posts"),{user,text,image:"",likes:0,comments:[]});
 }
};

window.like=async(id,l)=>await updateDoc(doc(db,"posts",id),{likes:l+1});

window.sendComment=async(id)=>{
 let i=document.getElementById("c-"+id);
 let t=i.value;
 if(!t)return;

 let ref=doc(db,"posts",id);
 let s=(await getDoc(ref)).data();
 let c=s.comments||[];

 c.push(user+": "+t);
 await updateDoc(ref,{comments:c});
 i.value="";
};

// LOAD POSTS
function load(){
 onSnapshot(collection(db,"posts"),async s=>{
  let html="";
  for(const d of s.docs){
   let p=d.data();

   let u=(await getDoc(doc(db,"users",p.user))).data();
   let online=u.online;

   html+=`
   <div class="card">
   <b>${p.user} ${online?"🟢":"⚫"}</b>
   <p>${p.text}</p>
   ${p.image?`<img src="${p.image}">`:""}
   ❤️ ${p.likes||0}
   <button onclick="like('${d.id}',${p.likes||0})">Like</button>
   <div>${(p.comments||[]).map(x=>`<p>${x}</p>`).join("")}</div>
   <input id="c-${d.id}">
   <button onclick="sendComment('${d.id}')">Send</button>
   </div>`;
  }
  posts.innerHTML=html;
 });
}

// CHAT
window.openChat=()=>chatUser=document.getElementById("chatUser").value;

window.sendMsg=async()=>{
 await addDoc(collection(db,"messages"),{from:user,to:chatUser,text:msg.value});
 msg.value="";
};

// REELS
window.uploadReel=async()=>{
 let f=reelFile.files[0];
 let r=new FileReader();
 r.onload=async()=>{
  await addDoc(collection(db,"reels"),{user,video:r.result});
 };
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),s=>{
  let h="";
  s.forEach(d=>{
   let r=d.data();
   h+=`<video src="${r.video}" controls></video>`;
  });
  reelBox.innerHTML=h;
 });
}

</script>

</body>
</html>
