<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top {display:flex;justify-content:space-between;background:#0c2b0c;padding:10px;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;}
.card{background:#1b3b1b;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div id="feed">
<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<div id="profile" style="display:none">
<h2 id="pname"></h2>
<p id="pcount"></p>
<p id="followers"></p>
<div id="profilePosts"></div>
</div>

<div id="notify" style="display:none">
<h2>🔔 Notifications</h2>
<div id="note"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,getDocs,doc,setDoc,getDoc,updateDoc} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";

// LOGIN
window.login = async ()=>{
 user=document.getElementById("username").value.trim();
 if(!user) return alert("Enter name");

 await setDoc(doc(db,"users",user),{
  followers:[],
  following:[]
 },{merge:true});

 loginBox.style.display="none";
 main.style.display="block";

 load();
};

// NAVIGATION
window.showFeed=()=>{
 feed.style.display="block";
 profile.style.display="none";
 notify.style.display="none";
};

window.showProfile=async ()=>{
 feed.style.display="none";
 profile.style.display="block";
 notify.style.display="none";

 pname.innerText=user;

 let snap=await getDocs(collection(db,"posts"));
 let count=0;
 let html="";

 snap.forEach(d=>{
  let p=d.data();

  if(p.user===user){
    count++;

    html+=`
    <div class="card">
      <p>${p.text}</p>
      ${p.image?`<img src="${p.image}" width="100%">`:""}
    </div>
    `;
  }
 });

 pcount.innerText="Posts: "+count;

 let u=await getDoc(doc(db,"users",user));
 followers.innerText="Followers: "+(u.data()?.followers?.length||0);

 document.getElementById("profilePosts").innerHTML = html;
};

window.showNotifications=async ()=>{
 feed.style.display="none";
 profile.style.display="none";
 notify.style.display="block";

 let snap=await getDocs(collection(db,"notifications"));
 let html="";

 snap.forEach(d=>{
  let n=d.data();
  if(n.to===user){
    html+=`<div class="card">${n.text}</div>`;
  }
 });

 note.innerHTML=html || "No notifications";
};

// POST
window.addPost=async ()=>{
 let text=document.getElementById("postText").value;
 let file=document.getElementById("file").files[0];

 if(file){
  let reader=new FileReader();
  reader.onload=async ()=>{
   await addDoc(collection(db,"posts"),{
    user,text,image:reader.result,likes:0,comments:[]
   });
   load();
  };
  reader.readAsDataURL(file);
 }else{
  await addDoc(collection(db,"posts"),{
   user,text,image:"",likes:0,comments:[]
  });
  load();
 }
};

// LIKE
window.like=async(id,likes,owner)=>{
 await updateDoc(doc(db,"posts",id),{
  likes:likes+1
 });

 if(owner!==user){
  await addDoc(collection(db,"notifications"),{
   text:user+" liked your post",
   to:owner
  });
 }

 load();
};

// COMMENT
window.sendComment=async(id,owner)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();

 if(!text) return;

 let snap=await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id){
    comments=d.data().comments||[];
  }
 });

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{
  comments
 });

 if(owner!==user){
  await addDoc(collection(db,"notifications"),{
   text:user+" commented: "+text,
   to:owner
  });
 }

 input.value="";
 load();
};

// FOLLOW
window.followUser=async(target)=>{
 if(target===user) return;

 let myRef=doc(db,"users",user);
 let tRef=doc(db,"users",target);

 let my=(await getDoc(myRef)).data();
 let t=(await getDoc(tRef)).data();

 let following=my.following||[];
 let followers=t.followers||[];

 if(following.includes(target)){
  following=following.filter(u=>u!==target);
  followers=followers.filter(u=>u!==user);
 }else{
  following.push(target);
  followers.push(user);
 }

 await updateDoc(myRef,{following});
 await updateDoc(tRef,{followers});

 load();
};

// 🔥 SMART FEED LOAD
async function load(){

 let userDoc = await getDoc(doc(db,"users",user));
 let following = userDoc.data()?.following || [];

 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();

  // 🔥 FILTER
  if(p.user !== user && !following.includes(p.user)) return;

  html+=`
  <div class="card">
    <b>${p.user}</b>
    ${p.user!==user?`<button onclick="followUser('${p.user}')">Follow</button>`:""}

    <p>${p.text}</p>

    ${p.image?`<img src="${p.image}" width="100%">`:""}

    ❤️ ${p.likes}
    <button onclick="like('${d.id}',${p.likes},'${p.user}')">Like</button>

    <div>
      ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}
    </div>

    <input id="c-${d.id}" placeholder="Write comment">
    <button onclick="sendComment('${d.id}','${p.user}')">Send</button>

  </div>
  `;
 });

 document.getElementById("posts").innerHTML=html;
}

</script>

</body>
</html>
