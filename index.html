<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: Arial;
  background: #0b1d0b;
  color: white;
  margin: 0;
  padding-bottom: 300px;
}

h1 {
  background: #0f2f0f;
  padding: 12px;
  margin: 0;
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  background: #0f2f0f;
  color: white;
}

button {
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg,#00c853,#64dd17);
  margin: 5px;
  color: white;
}

.card {
  background: #1a2e1a;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">

<input id="text" placeholder="Write post">
<input type="file" id="imageInput">
<button onclick="post()">Post</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";

window.login=()=>{
 user=document.getElementById("username").value;
 document.getElementById("app").style.display="block";
 load();
};

// POST WITH IMAGE
window.post = async () => {
  let text = document.getElementById("text").value.trim();
  let file = document.getElementById("imageInput").files[0];

  if(file){
    let reader = new FileReader();

    reader.onloadend = async () => {
      let imageBase64 = reader.result;

      await addDoc(collection(db,"posts"),{
        user,
        text,
        image:imageBase64,
        comments:[]
      });

      document.getElementById("text").value="";
      document.getElementById("imageInput").value="";
      load();
    };

    reader.readAsDataURL(file);

  } else {
    await addDoc(collection(db,"posts"),{
      user,
      text,
      image:"",
      comments:[]
    });

    load();
  }
};

// COMMENT
window.addComment = async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text) return;

 let snap=await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id){
    comments=d.data().comments || [];
  }
 });

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{comments});

 input.value="";
 load();
};

// LOAD POSTS
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`
  <div class="card">
    <b>${p.user}</b>
    <p>${p.text}</p>

    ${p.image ? `<img src="${p.image}" style="width:100%;border-radius:10px;margin-top:10px;">` : ""}

    ${(p.comments||[]).map(c=>`
      <div style="background:#0f2f0f;padding:8px;border-radius:10px;margin-top:5px;font-size:14px;">
        ${c}
      </div>
    `).join("")}

    <input id="c-${id}" placeholder="Write comment...">
    <button onclick="addComment('${id}')">Send</button>
  </div>
  `;
 });

 document.getElementById("feed").innerHTML=html;
}

// KEYBOARD FIX
document.addEventListener("focusin",(e)=>{
 if(e.target.tagName==="INPUT"){
  setTimeout(()=>{
    e.target.scrollIntoView({behavior:"smooth",block:"center"});
  },300);
 }
});

</script>

</body>
</html>
