<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(180deg,#021a02,#063d06);
 color:white;
}

.card{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 border-radius:15px;
 padding:15px;
 margin:10px;
}

input{
 width:80%;
 padding:12px;
 border-radius:20px;
 border:none;
 background:#123812;
 color:white;
 margin:5px;
 font-size:16px;
}

button{
 background:#00c853;
 border:none;
 padding:10px;
 border-radius:20px;
 color:white;
}

img,video{
 width:100%;
 border-radius:10px;
 margin-top:10px;
}

.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#0c2b0c;
 display:flex;
 justify-content:space-around;
 padding:10px;
}

#main{padding-bottom:70px;}
</style>
</head>

<body>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<!-- FEED -->
<div id="feed">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining</button>
</div>

<div class="card">
⚡ Level: <span id="mineLevel">1</span>
<button onclick="upgradeMining()">Upgrade</button>
</div>

<div class="card">
🏆 Leaderboard
<div id="leaderboard"></div>
</div>

<div class="card">
🎁 Daily Bonus  
🔥 Streak: <span id="streak">0</span><br>
<button onclick="claimBonus()">Claim</button>
</div>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
<div class="card">
<h3>👤 Profile</h3>
<p>Name: <span id="pName"></span></p>
<p>Coins: <span id="pCoins"></span></p>
<p>Level: <span id="pLevel"></span></p>
</div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" style="display:none">
<div class="card">
<h3>🔔 Notifications</h3>
<div id="notifList"></div>
</div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<div class="card">
<h3>💬 Chat</h3>

<input id="chatUser" placeholder="Send to user">
<input id="chatMsg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>
</div>
</div>

<!-- REELS -->
<div id="reels" style="display:none">

<div class="card">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
</div>

<div id="reelPlayer" class="card"></div>

<div style="text-align:center">
<button onclick="prevReel()">⬆️</button>
<button onclick="nextReel()">⬇️</button>
</div>

</div>

</div>

<div class="bottom">
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="";
let reelsList=[];
let currentReel=0;

/* LOGIN */
window.login=async()=>{
 user=username.value.trim();
 if(!user)return;

 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   miningStart:Date.now(),
   mineLevel:1,
   online:true,
   streak:0,
   lastClaim:0
  });
 }else{
  await updateDoc(ref,{online:true});
 }

 loginBox.style.display="none";
 main.style.display="block";

 loadAll();
 setInterval(loadCoins,1000);
};

/* NAV */
window.showFeed=()=>{hideAll();feed.style.display="block";}
window.showProfile=()=>{hideAll();profile.style.display="block";loadProfile();}
window.showNotifications=()=>{hideAll();notifications.style.display="block";loadNotifications();}
window.showChat=()=>{hideAll();chat.style.display="block";loadChat();}
window.showReels=()=>{hideAll();reels.style.display="block";}

function hideAll(){
 feed.style.display="none";
 profile.style.display="none";
 notifications.style.display="none";
 chat.style.display="none";
 reels.style.display="none";
}

/* MINING */
window.startMining=async()=>{
 await updateDoc(doc(db,"users",user),{miningStart:Date.now()});
};

async function loadCoins(){
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 let coins=d.coins||0;
 let start=d.miningStart||Date.now();
 let level=d.mineLevel||1;

 let sec=(Date.now()-start)/1000;
 let speed=(20+(level-1)*4)/86400;

 let total=coins+(sec*speed);

 await updateDoc(ref,{coins:total,miningStart:Date.now()});
 coinBal.innerText=total.toFixed(5);
}

/* POSTS */
function loadPosts(){
 onSnapshot(collection(db,"posts"), async snap=>{
  let html="";

  for(const d of snap.docs){
   let p=d.data();
   let u=(await getDoc(doc(db,"users",p.user))).data();

   html+=`
   <div class="card">
   <b>${p.user} ${u?.online?"🟢":"⚫"}</b>
   <p>${p.text||""}</p>
   ${p.image?`<img src="${p.image}">`:""}

   ❤️ ${p.likes||0}
   <button onclick="likePost('${d.id}',${p.likes||0},'${p.user}')">Like</button>

   ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}

   <input id="c-${d.id}">
   <button onclick="sendComment('${d.id}','${p.user}')">Send</button>
   </div>`;
  }

  posts.innerHTML=html;
 });
}

window.likePost=async(id,likes,to)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});

 await addDoc(collection(db,"notifications"),{
  to,
  msg:user+" liked your post"
 });
};

window.sendComment=async(id,to)=>{
 let i=document.getElementById("c-"+id);
 let text=i.value;

 let ref=doc(db,"posts",id);
 let d=(await getDoc(ref)).data();

 let c=d.comments||[];
 c.push(user+": "+text);

 await updateDoc(ref,{comments:c});

 await addDoc(collection(db,"notifications"),{
  to,
  msg:user+" commented on your post"
 });

 i.value="";
};

/* PROFILE */
async function loadProfile(){
 let d=(await getDoc(doc(db,"users",user))).data();

 pName.innerText=user;
 pCoins.innerText=(d.coins||0).toFixed(5);
 pLevel.innerText=d.mineLevel||1;
}

/* NOTIFICATIONS */
function loadNotifications(){
 onSnapshot(collection(db,"notifications"),snap=>{
  let html="";
  snap.forEach(d=>{
   let n=d.data();
   if(n.to===user){
    html+=`<p>${n.msg}</p>`;
   }
  });
  notifList.innerHTML=html;
 });
}

/* CHAT */
window.sendMsg=async()=>{
 await addDoc(collection(db,"chats"),{
  from:user,
  to:chatUser.value,
  text:chatMsg.value
 });
 chatMsg.value="";
};

function loadChat(){
 onSnapshot(collection(db,"chats"),snap=>{
  let html="";
  snap.forEach(d=>{
   let c=d.data();
   if(c.from===user || c.to===user){
    html+=`<p><b>${c.from}:</b> ${c.text}</p>`;
   }
  });
  chatBox.innerHTML=html;
 });
}

/* REELS */
window.uploadReel=async()=>{
 let f=reelFile.files[0];
 let r=new FileReader();
 r.onload=()=>addDoc(collection(db,"reels"),{user,video:r.result});
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),snap=>{
  reelsList=[];
  snap.forEach(d=>reelsList.push({id:d.id,...d.data()}));
  if(reelsList.length>0)showReel(0);
 });
}

function showReel(i){
 currentReel=i;
 let r=reelsList[i];

 reelPlayer.innerHTML=`
 <video src="${r.video}" autoplay controls></video>
 <p>${r.user}</p>`;
}

window.nextReel=()=>{if(currentReel<reelsList.length-1)showReel(currentReel+1);}
window.prevReel=()=>{if(currentReel>0)showReel(currentReel-1);}

/* LEADERBOARD */
function loadLeaderboard(){
 onSnapshot(collection(db,"users"),snap=>{
  let arr=[];
  snap.forEach(d=>arr.push({n:d.id,c:d.data().coins||0}));
  arr.sort((a,b)=>b.c-a.c);

  leaderboard.innerHTML=arr.slice(0,5)
   .map((u,i)=>`${i+1}. ${u.n} - ${u.c.toFixed(5)}`)
   .join("<br>");
 });
}

/* BONUS */
window.claimBonus=async()=>{
 let ref=doc(db,"users",user);
 let d=(await getDoc(ref)).data();

 if(Date.now()-d.lastClaim<86400000)return;

 let s=(d.streak||0)+1;

 await updateDoc(ref,{
  coins:d.coins+(s*0.1),
  streak:s,
  lastClaim:Date.now()
 });
};

/* LOAD ALL */
function loadAll(){
 loadPosts();
 loadReels();
 loadLeaderboard();
}

</script>

</body>
</html>
