<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: Arial;
  background: #0b1d0b;
  color: white;
  margin: 0;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f2f0f;
  padding:10px;
}

input {
  width: 85%;
  padding: 12px;
  margin: 8px;
  border-radius: 20px;
  border: none;
  background: #0f2f0f;
  color: white;
}

button {
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg,#00c853,#64dd17);
  color: white;
}

.card {
  background: #1a2e1a;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>

</head>

<body>

<div class="topbar">
<h2>🌍 Nature Connect</h2>

<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
</div>
</div>

<div id="loginPage">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div id="feedSection">
<input id="text" placeholder="Write post">
<input type="file" id="imageInput">
<button onclick="post()">Post</button>
<div id="feed"></div>
</div>

<div id="profileSection" style="display:none;">
<h2 id="profileName"></h2>
<p id="postCount"></p>
<div id="profilePosts"></div>
</div>

<div id="notificationSection" style="display:none;">
<h2>🔔 Notifications</h2>
<div id="notifications"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user = "";

// LOGIN
window.login=()=>{
 user=document.getElementById("username").value.trim();
 if(!user) return alert("Enter name");

 document.getElementById("app").style.display="block";
 document.getElementById("loginPage").style.display="none";

 load();
};

// NAV
window.showFeed=()=>{
 document.getElementById("feedSection").style.display="block";
 document.getElementById("profileSection").style.display="none";
 document.getElementById("notificationSection").style.display="none";
};

window.showProfile=()=>{
 document.getElementById("feedSection").style.display="none";
 document.getElementById("profileSection").style.display="block";
 document.getElementById("notificationSection").style.display="none";
 loadProfile();
};

window.showNotifications=()=>{
 document.getElementById("feedSection").style.display="none";
 document.getElementById("profileSection").style.display="none";
 document.getElementById("notificationSection").style.display="block";
 loadNotifications();
};

// POST
window.post = async () => {
 let text = document.getElementById("text").value.trim();
 let file = document.getElementById("imageInput").files[0];

 if(!text && !file) return;

 if(file){
   let reader = new FileReader();

   reader.onloadend = async () => {
     await addDoc(collection(db,"posts"),{
       user,
       text,
       image:reader.result,
       comments:[],
       likes:0
     });
     load();
   };

   reader.readAsDataURL(file);

 } else {
   await addDoc(collection(db,"posts"),{
     user,
     text,
     image:"",
     comments:[],
     likes:0
   });
   load();
 }
};

// ❤️ LIKE
window.likePost = async(id,likes,owner)=>{
 await updateDoc(doc(db,"posts",id),{
  likes: (likes || 0) + 1
 });

 // 🔔 Notification
 if(owner !== user){
   await addDoc(collection(db,"notifications"),{
     text: user + " liked your post",
     to: owner
   });
 }

 load();
};

// 💬 COMMENT
window.addComment = async(id,owner)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text) return;

 let snap=await getDocs(collection(db,"posts"));
 let comments=[];

 snap.forEach(d=>{
  if(d.id===id){
    comments=d.data().comments || [];
  }
 });

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{comments});

 // 🔔 Notification
 if(owner !== user){
   await addDoc(collection(db,"notifications"),{
     text: user + " commented: " + text,
     to: owner
   });
 }

 input.value="";
 load();
};

// LOAD
async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`
  <div class="card">
    <b>${p.user}</b>
    <p>${p.text}</p>

    ${p.image && p.image.startsWith("data:image")
      ? `<img src="${p.image}" style="width:100%;border-radius:10px;">`
      : ""}

    ❤️ ${p.likes || 0}
    <button onclick="likePost('${id}',${p.likes||0},'${p.user}')">Like</button>

    ${(p.comments||[]).map(c=>`
      <div style="background:#0f2f0f;padding:8px;border-radius:10px;margin-top:5px;">
        ${c}
      </div>
    `).join("")}

    <input id="c-${id}" placeholder="Write comment...">
    <button onclick="addComment('${id}','${p.user}')">Send</button>
  </div>
  `;
 });

 document.getElementById("feed").innerHTML=html;
}

// PROFILE
async function loadProfile(){
 let snap=await getDocs(collection(db,"posts"));

 let count=0;
 let html="";

 snap.forEach(d=>{
  let p=d.data();

  if(p.user===user){
    count++;

    html+=`
    <div class="card">
      <p>${p.text}</p>
      ❤️ ${p.likes || 0}
      ${p.image ? `<img src="${p.image}" style="width:100%;border-radius:10px;">` : ""}
    </div>
    `;
  }
 });

 document.getElementById("profileName").innerText=user;
 document.getElementById("postCount").innerText="Posts: "+count;
 document.getElementById("profilePosts").innerHTML=html;
}

// 🔔 LOAD NOTIFICATIONS
async function loadNotifications(){
 let snap=await getDocs(collection(db,"notifications"));
 let html="";

 snap.forEach(d=>{
  let n=d.data();

  if(n.to === user){
    html+=`<div class="card">${n.text}</div>`;
  }
 });

 document.getElementById("notifications").innerHTML=html || "No notifications";
}

// KEYBOARD FIX
document.addEventListener("focusin",(e)=>{
 if(e.target.tagName==="INPUT"){
  setTimeout(()=>{
    e.target.scrollIntoView({behavior:"smooth",block:"center"});
  },300);
 }
});

</script>

</body>
</html>
