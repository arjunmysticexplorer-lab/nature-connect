<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(90deg,#3ec6d3,#5fd3a3,#fce38a);
}

/* LOGIN */
#loginBox{
 padding:20px;
}

input{
 width:80%;
 padding:12px;
 border-radius:20px;
 border:none;
}

button{
 background:#00ff88;
 border:none;
 padding:10px 20px;
 border-radius:20px;
 margin-top:10px;
}

/* CARDS */
.card{
 background:rgba(0,0,0,0.5);
 color:white;
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* POSTS */
.post{
 background:rgba(0,0,0,0.6);
 padding:10px;
 margin:10px;
 border-radius:10px;
 color:white;
}

/* BOTTOM NAV */
.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#000;
 display:flex;
 justify-content:space-around;
 padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<input id="username" placeholder="Enter name">
<br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="card">
💰 QNC: <span id="coinBal">0.00000</span><br>
<button onclick="startMining()">⛏️ Start Mining (24h)</button>
</div>

<div class="card">
💼 Wallet: <span id="walletBal">0.00000</span>
</div>

<div class="card">
🟢 Status: <span id="status">Offline</span>
</div>

<div class="card">
<input id="postText" placeholder="Write post">
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

</div>

<!-- BOTTOM -->
<div class="bottom">
<button onclick="goHome()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotify()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showVideo()">🎥</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user = "";

/* LOGIN */
window.login = async () => {
 user = username.value.trim();

 if(!user){
  alert("Enter name");
  return;
 }

 const ref = doc(db,"users",user);
 const snap = await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
   coins:0,
   wallet:0,
   miningStart:0,
   miningActive:false,
   online:true
  });
 }else{
  await updateDoc(ref,{online:true});
 }

 status.innerText = "Online";

 loginBox.style.display = "none";
 main.style.display = "block";

 loadUser();

 setInterval(updateMining,1000);
};

/* MINING START */
window.startMining = async () => {
 let ref = doc(db,"users",user);

 await updateDoc(ref,{
  miningStart:Date.now(),
  miningActive:true
 });
};

/* MINING SYSTEM */
async function updateMining(){

 let ref = doc(db,"users",user);
 let d = (await getDoc(ref)).data();

 if(!d || !d.miningActive) return;

 let now = Date.now();
 let start = d.miningStart || now;

 let coins = d.coins || 0;

 let diff = (now - start)/1000;

 let rate = 20/86400;

 let earned = diff * rate;

 let newCoins = coins + earned;

 await updateDoc(ref,{
  coins:newCoins,
  miningStart:now
 });

 coinBal.innerText = newCoins.toFixed(5);
}

/* LOAD USER */
function loadUser(){
 let ref = doc(db,"users",user);

 onSnapshot(ref,(snap)=>{
  let d = snap.data();
  if(!d) return;

  coinBal.innerText = (d.coins||0).toFixed(5);
  walletBal.innerText = (d.wallet||0).toFixed(5);
 });
}

/* POSTS */
window.addPost = async () => {
 if(!postText.value) return;

 await addDoc(collection(db,"posts"),{
  user,
  text:postText.value,
  likes:0,
  comments:[]
 });

 postText.value="";
};

onSnapshot(collection(db,"posts"),snap=>{
 let html="";
 snap.forEach(docu=>{
  let p = docu.data();

  html += `
  <div class="post">
  <b>${p.user}</b>
  <p>${p.text}</p>

  ❤️ ${p.likes}
  <button onclick="likePost('${docu.id}',${p.likes})">Like</button>

  ${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}

  <input id="c-${docu.id}" placeholder="comment">
  <button onclick="comment('${docu.id}')">Send</button>
  </div>
  `;
 });

 posts.innerHTML = html;
});

/* LIKE */
window.likePost = async(id,likes)=>{
 await updateDoc(doc(db,"posts",id),{
  likes:likes+1
 });
};

/* COMMENT */
window.comment = async(id)=>{
 let input = document.getElementById("c-"+id);
 let text = input.value;

 if(!text) return;

 let ref = doc(db,"posts",id);
 let d = (await getDoc(ref)).data();

 let arr = d.comments || [];
 arr.push(user+": "+text);

 await updateDoc(ref,{comments:arr});

 input.value="";
};

/* NAV BUTTONS */
window.goHome=()=>alert("Home");
window.showProfile=()=>alert("Profile");
window.showNotify=()=>alert("Notifications");
window.showChat=()=>alert("Chat");
window.showVideo=()=>alert("Reels");

</script>

</body>
</html>
