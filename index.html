<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
 body {
   font-family: Arial;
   background: linear-gradient(to bottom, #0b1d0b, #1f3d1f);
   color: white;
   margin: 0;
   text-align: center;
 }

 h1 {
   background: black;
   padding: 15px;
   margin: 0;
 }

 .container {
   padding: 20px;
 }

 input {
   padding: 10px;
   width: 80%;
   margin: 5px;
   border-radius: 10px;
   border: none;
 }

 button {
   padding: 10px 20px;
   margin: 10px;
   border: none;
   border-radius: 20px;
   background: green;
   color: white;
   font-weight: bold;
 }

 .card {
   background: #1a2e1a;
   padding: 15px;
   margin: 10px;
   border-radius: 15px;
 }

 img {
   width: 100%;
   border-radius: 10px;
   margin-top: 10px;
 }
</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div class="container">

<input id="text" placeholder="Share your moment..." />
<br>

<input type="file" id="imageInput" accept="image/*" />
<br>

<button onclick="post()">Post</button>

<h2>Feed</h2>
<div id="feed"></div>

<h2>AI Assistant 🤖</h2>
<input id="aiInput" placeholder="Ask something..." />
<button onclick="aiReply()">Ask AI</button>
<p id="aiOutput"></p>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || []
show()

function post(){
 let text = document.getElementById("text").value
 let file = document.getElementById("imageInput").files[0]

 if(text === "" && !file) return

 if(file){
   let reader = new FileReader()

   reader.onload = function(e){
     let postData = {
       text: text,
       image: e.target.result
     }

     posts.unshift(postData)
     localStorage.setItem("posts", JSON.stringify(posts))
     show()
   }

   reader.readAsDataURL(file)

 } else {
   let postData = {
     text: text,
     image: null
   }

   posts.unshift(postData)
   localStorage.setItem("posts", JSON.stringify(posts))
   show()
 }

 document.getElementById("text").value = ""
 document.getElementById("imageInput").value = ""
}

function show(){
 let html = ""

 posts.forEach(p=>{
   html += "<div class='card'>"

   if(p.text){
     html += "<p>" + p.text + "</p>"
   }

   if(p.image){
     html += "<img src='" + p.image + "'/>"
   }

   html += "</div>"
 })

 document.getElementById("feed").innerHTML = html
}

function aiReply(){
 let input = document.getElementById("aiInput").value.toLowerCase()
 let reply = ""

 if(input.includes("hello")){
  reply = "Hello! Welcome to Nature 🌿"
 }
 else if(input.includes("nature")){
  reply = "Nature is peace 🌄"
 }
 else{
  reply = "Ask about nature 🙂"
 }

 document.getElementById("aiOutput").innerText = reply
}

</script>

</body>
</html>
