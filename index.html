<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #0b1d0b, #020402);
  color: white;
  margin: 0;
}

/* HEADER */
h1 {
  background: #0f2f0f;
  padding: 15px;
  margin: 0;
  font-size: 22px;
  border-bottom: 1px solid #1f3d1f;
}

/* INPUTS */
input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #1a2e1a;
  color: white;
}

/* BUTTONS */
button {
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, #00c853, #64dd17);
  color: black;
  font-weight: bold;
  margin: 5px;
}

/* CARD */
.card {
  background: rgba(26, 46, 26, 0.9);
  margin: 12px;
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* IMAGE */
img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* COMMENTS */
.comment {
  background: #0f2a0f;
  padding: 6px;
  margin: 5px;
  border-radius: 8px;
  font-size: 13px;
}

/* NAV BUTTONS */
.nav {
  text-align: center;
  margin: 10px;
}

</style>

</head>

<body>

<h1>🌍 Nature Connect</h1>

<div id="loginPage">
<input id="username" placeholder="Enter your name">
<button onclick="login()">Login</button>
</div>

<div id="appPage" style="display:none;">

<h2 id="welcome"></h2>

<div class="nav">
<button onclick="showFeed()">🌍 Feed</button>
<button onclick="showProfile()">👤 Profile</button>
<button onclick="logout()">Logout</button>
</div>

<div id="feedSection">

<input id="text" placeholder="Share something...">
<input type="file" id="imageInput">
<br>
<button onclick="post()">Post</button>

<div id="feed"></div>
</div>

<div id="profileSection" style="display:none;">
<h2>👤 My Profile</h2>

<input id="bioInput" placeholder="Write your bio">
<button onclick="saveBio()">Save</button>

<p id="bioText"></p>

<h3>My Posts</h3>
<div id="myPosts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
  authDomain: "nature-connect-a1592.firebaseapp.com",
  projectId: "nature-connect-a1592",
  storageBucket: "nature-connect-a1592.firebasestorage.app",
  messagingSenderId: "734768119211",
  appId: "1:734768119211:web:7633f476bc22d8d552e6ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("user") || "";

if(user) showApp();

window.login = function(){
 user = document.getElementById("username").value.trim();
 if(!user) return alert("Enter name");
 localStorage.setItem("user", user);
 showApp();
}

window.logout = function(){
 localStorage.removeItem("user");
 location.reload();
}

function showApp(){
 document.getElementById("loginPage").style.display="none";
 document.getElementById("appPage").style.display="block";
 document.getElementById("welcome").innerText="Welcome "+user;
 load();
 loadProfile();
}

window.showFeed = function(){
 document.getElementById("feedSection").style.display="block";
 document.getElementById("profileSection").style.display="none";
}

window.showProfile = function(){
 document.getElementById("feedSection").style.display="none";
 document.getElementById("profileSection").style.display="block";
 loadProfile();
}

window.post = async function(){

 let text = document.getElementById("text").value.trim();
 let file = document.getElementById("imageInput").files[0];

 if(!text && !file) return alert("Write something");

 let image=null;

 if(file){
  image=await new Promise(resolve=>{
   let img=new Image();
   let reader=new FileReader();
   reader.onload=e=>img.src=e.target.result;

   img.onload=function(){
    let canvas=document.createElement("canvas");
    let ctx=canvas.getContext("2d");

    let w=600;
    let scale=w/img.width;

    canvas.width=w;
    canvas.height=img.height*scale;

    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    resolve(canvas.toDataURL("image/jpeg",0.7));
   };

   reader.readAsDataURL(file);
  });
 }

 await addDoc(collection(db,"posts"),{
  user,text,image,likes:0,comments:[]
 });

 document.getElementById("text").value="";
 document.getElementById("imageInput").value="";

 load();
}

window.likePost=async function(id,likes){
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 load();
}

window.addComment=async function(id,comments){
 let input=document.getElementById("comment-"+id);
 let text=input.value.trim();
 if(!text)return;

 comments.push(user+": "+text);

 await updateDoc(doc(db,"posts",id),{comments});
 input.value="";
 load();
}

async function load(){
 let snap=await getDocs(collection(db,"posts"));
 let html="";

 snap.forEach(d=>{
  let p=d.data();
  let id=d.id;

  html+=`<div class="card">
  <b>${p.user}</b>
  ${p.text?`<p>${p.text}</p>`:""}
  ${p.image?`<img src="${p.image}">`:""}
  <p>❤️ ${p.likes||0}</p>
  <button onclick="likePost('${id}',${p.likes||0})">Like</button>
  ${(p.comments||[]).map(c=>`<div class="comment">${c}</div>`).join("")}
  <input id="comment-${id}" placeholder="Comment">
  <button onclick="addComment('${id}',${JSON.stringify(p.comments||[])})">Send</button>
  </div>`;
 });

 document.getElementById("feed").innerHTML=html;
}

window.saveBio=async function(){
 let bio=document.getElementById("bioInput").value;
 await setDoc(doc(db,"users",user),{bio});
 loadProfile();
}

async function loadProfile(){
 let ref=doc(db,"users",user);
 let snap=await getDoc(ref);

 if(snap.exists()){
  document.getElementById("bioText").innerText="Bio: "+snap.data().bio;
 }

 let posts=await getDocs(collection(db,"posts"));
 let html="";

 posts.forEach(d=>{
  let p=d.data();
  if(p.user===user){
   html+=`<div class="card">
   ${p.text?`<p>${p.text}</p>`:""}
   ${p.image?`<img src="${p.image}">`:""}
   </div>`;
  }
 });

 document.getElementById("myPosts").innerHTML=html;
}

</script>

</body>
</html>
