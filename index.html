<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;padding:12px;background:#0c2b0c;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
.card{background:#1b3b1b;padding:15px;border-radius:15px;margin:10px;}
img{width:100%;border-radius:10px;margin-top:10px;}

.storyBar{display:flex;overflow:auto;padding:10px;}
.story img{width:60px;height:60px;border-radius:50%;}

.chat-me{background:#00c853;padding:8px;margin:5px;border-radius:10px;text-align:right;}
.chat-other{background:#1b3b1b;padding:8px;margin:5px;border-radius:10px;}

.fullStory{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;justify-content:center;align-items:center;z-index:100;}
.fullStory img{width:100%;height:80%;}
</style>
</head>

<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
<button onclick="showReels()">🎥</button>
</div>
</div>

<div id="fullStory" class="fullStory" onclick="nextStory()">
<img id="storyImg">
</div>

<div id="loginBox">
<input id="username">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<div id="feed">
<div id="stories"></div>
<input type="file" id="storyFile">
<button onclick="addStory()">Story</button>

<input id="postText">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<div id="profile" style="display:none">
<h2 id="pname"></h2>
<input type="file" id="dpFile">
<button onclick="uploadDP()">Upload DP</button>
<img id="myDP" width="80">
</div>

<div id="notify" style="display:none">
<div id="note"></div>
</div>

<div id="chat" style="display:none">
<input id="chatUser">
<button onclick="openChat()">Open</button>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<div id="reels" style="display:none">
<input type="file" id="reelFile">
<button onclick="uploadReel()">Upload</button>
<div id="reelBox"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {getFirestore,collection,addDoc,getDocs,doc,setDoc,getDoc,updateDoc,onSnapshot}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db=getFirestore(app);

let user="",currentChatUser="",stories=[],i=0;

window.login=async()=>{
 user=username.value;
 await setDoc(doc(db,"users",user),{}, {merge:true});
 loginBox.style.display="none";
 main.style.display="block";
 load();loadStories();loadReels();
};

// NAV FIX
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showProfile=()=>{feed.style.display="none";profile.style.display="block";notify.style.display="none";chat.style.display="none";reels.style.display="none";}
window.showNotifications=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="block";chat.style.display="none";reels.style.display="none";}
window.showChat=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="block";reels.style.display="none";}
window.showReels=()=>{feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="none";reels.style.display="block";}

// DP
window.uploadDP=async()=>{
 let f=dpFile.files[0]; if(!f)return;
 let r=new FileReader();
 r.onload=async()=>{await updateDoc(doc(db,"users",user),{dp:r.result}); myDP.src=r.result;}
 r.readAsDataURL(f);
};

// STORY
window.addStory=async()=>{
 let f=storyFile.files[0]; if(!f)return;
 let r=new FileReader();
 r.onload=async()=>{await addDoc(collection(db,"stories"),{user,image:r.result,time:Date.now()});}
 r.readAsDataURL(f);
};

function loadStories(){
 onSnapshot(collection(db,"stories"),s=>{
  let h="";stories=[];
  s.forEach(d=>{
   let x=d.data(); if(Date.now()-x.time>86400000)return;
   stories.push(x);
   h+=`<img src="${x.image}" width="50" onclick="openStory(${stories.length-1})">`;
  });
  storiesDiv.innerHTML=h;
 });
}

window.openStory=(x)=>{i=x;fullStory.style.display="flex";storyImg.src=stories[i].image;}
window.nextStory=()=>{i++; if(i>=stories.length)fullStory.style.display="none"; else storyImg.src=stories[i].image;}

// POST
window.addPost=async()=>{
 let t=postText.value;
 let f=file.files[0];
 if(f){
  let r=new FileReader();
  r.onload=async()=>await addDoc(collection(db,"posts"),{user,text:t,image:r.result});
  r.readAsDataURL(f);
 }else await addDoc(collection(db,"posts"),{user,text:t});
};

function load(){
 onSnapshot(collection(db,"posts"),async s=>{
  let h="";
  for(const d of s.docs){
   let p=d.data();
   let u=await getDoc(doc(db,"users",p.user));
   let dp=u.data()?.dp||"";
   h+=`<div class="card"><b><img src="${dp}" width="30">${p.user}</b><p>${p.text}</p>${p.image?`<img src="${p.image}">`:""}</div>`;
  }
  posts.innerHTML=h;
 });
}

// CHAT
window.openChat=()=>{currentChatUser=chatUser.value;loadChat();}
window.sendMsg=async()=>{await addDoc(collection(db,"messages"),{from:user,to:currentChatUser,text:msg.value});msg.value="";}

function loadChat(){
 onSnapshot(collection(db,"messages"),s=>{
  let h="";
  s.forEach(d=>{
   let m=d.data();
   if(m.from===user||m.to===user){
    h+=`<div>${m.text}</div>`;
   }
  });
  chatBox.innerHTML=h;
 });
}

// REELS
window.uploadReel=async()=>{
 let f=reelFile.files[0]; if(!f)return;
 let r=new FileReader();
 r.onload=async()=>await addDoc(collection(db,"reels"),{user,video:r.result});
 r.readAsDataURL(f);
};

function loadReels(){
 onSnapshot(collection(db,"reels"),s=>{
  let h="";
  s.forEach(d=>{
   let r=d.data();
   h+=`<video src="${r.video}" controls style="width:100%"></video>`;
  });
  reelBox.innerHTML=h;
 });
}

</script>

</body>
</html>
