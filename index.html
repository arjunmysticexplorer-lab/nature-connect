<!DOCTYPE html>
<html>
<head>
<title>Nature Connect</title>

<style>
body{margin:0;background:#071a07;color:white;font-family:sans-serif;}
.top{display:flex;justify-content:space-between;background:#0c2b0c;padding:12px;}
input{width:80%;padding:10px;border-radius:20px;border:none;background:#123812;color:white;margin:5px;}
button{padding:8px;border:none;border-radius:20px;background:#00c853;color:white;}
.card{background:linear-gradient(145deg,#1b3b1b,#0f2d0f);padding:15px;border-radius:15px;margin:10px;}
img{width:100%;border-radius:10px;margin-top:10px;}
.storyBar{display:flex;overflow:auto;padding:10px;}
.story{margin-right:10px;text-align:center;}
.story img{width:60px;height:60px;border-radius:50%;border:2px solid #00c853;}
.chat-me{background:#00c853;padding:8px;border-radius:10px;margin:5px;text-align:right;}
.chat-other{background:#1b3b1b;padding:8px;border-radius:10px;margin:5px;}
.typing{font-size:12px;color:lightgreen;margin:5px;}
.status{font-size:10px;color:lightgray;}
</style>

</head>

<body>

<div class="top">
<b>🌍 Nature Connect</b>
<div>
<button onclick="showFeed()">🏠</button>
<button onclick="showProfile()">👤</button>
<button onclick="showNotifications()">🔔</button>
<button onclick="showChat()">💬</button>
</div>
</div>

<div id="loginBox">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none">

<!-- FEED -->
<div id="feed">

<div class="storyBar" id="stories"></div>
<input type="file" id="storyFile">
<button onclick="addStory()">Add Story</button>

<input id="postText" placeholder="Write post">
<input type="file" id="file">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
<h2 id="pname"></h2>
<p id="pcount"></p>
<p id="followers"></p>
<div id="profilePosts"></div>
</div>

<!-- NOTIFICATION -->
<div id="notify" style="display:none">
<h2>🔔 Notifications</h2>
<div id="note"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<h2>💬 Chat</h2>
<input id="chatUser" placeholder="Enter username">
<button onclick="openChat()">Open</button>

<div id="chatBox"></div>
<div id="typingBox"></div>

<input id="msg" placeholder="Type message" oninput="typing()">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,collection,addDoc,getDocs,doc,setDoc,getDoc,updateDoc,onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyDRwZnpg6UnoBhafPNlEWWAYRVikQyHQTk",
 projectId:"nature-connect-a1592"
});

const db = getFirestore(app);

let user="";
let currentChatUser="";

// LOGIN
window.login=async ()=>{
 user=username.value.trim();
 if(!user) return alert("Enter name");

 await setDoc(doc(db,"users",user),{
  followers:[],following:[],online:true
 },{merge:true});

 loginBox.style.display="none";
 main.style.display="block";

 load();
 loadStories();
};

// OFFLINE
window.addEventListener("beforeunload",async ()=>{
 if(user){
  await updateDoc(doc(db,"users",user),{online:false});
 }
});

// NAV
window.showFeed=()=>{feed.style.display="block";profile.style.display="none";notify.style.display="none";chat.style.display="none";};
window.showProfile=async ()=>{
 feed.style.display="none";profile.style.display="block";notify.style.display="none";chat.style.display="none";
 pname.innerText=user;

 let snap=await getDocs(collection(db,"posts"));
 let html="";let count=0;

 snap.forEach(d=>{
  let p=d.data();
  if(p.user===user){count++;html+=`<div class="card">${p.text}</div>`;}
 });

 pcount.innerText="Posts: "+count;

 let u=await getDoc(doc(db,"users",user));
 followers.innerText="Followers: "+(u.data()?.followers?.length||0);

 profilePosts.innerHTML=html;
};

window.showNotifications=()=>{
 feed.style.display="none";profile.style.display="none";notify.style.display="block";chat.style.display="none";

 onSnapshot(collection(db,"notifications"),(snap)=>{
  let html="";
  snap.forEach(d=>{
   let n=d.data();
   if(n.to===user){html+=`<div class="card">${n.text}</div>`;}
  });
  note.innerHTML=html;
 });
};

window.showChat=()=>{
 feed.style.display="none";profile.style.display="none";notify.style.display="none";chat.style.display="block";
};

// STORY ADD
window.addStory=async ()=>{
 let file=document.getElementById("storyFile").files[0];
 if(!file) return;

 let reader=new FileReader();
 reader.onload=async ()=>{
  await addDoc(collection(db,"stories"),{
   user,image:reader.result,time:Date.now()
  });
 };
 reader.readAsDataURL(file);
};

// STORY LOAD
function loadStories(){
 onSnapshot(collection(db,"stories"),(snap)=>{
  let html="";

  snap.forEach(d=>{
   let s=d.data();

   if(Date.now()-s.time > 86400000) return;

   html+=`
   <div class="story">
    <img src="${s.image}">
    <div style="font-size:10px">${s.user}</div>
   </div>`;
  });

  stories.innerHTML=html;
 });
}

// POST
window.addPost=async ()=>{
 let text=postText.value;
 let file=document.getElementById("file").files[0];

 if(file){
  let reader=new FileReader();
  reader.onload=async ()=>{
   await addDoc(collection(db,"posts"),{
    user,text,image:reader.result,likes:0,comments:[]
   });
  };
  reader.readAsDataURL(file);
 }else{
  await addDoc(collection(db,"posts"),{
   user,text,image:"",likes:0,comments:[]
  });
 }
};

// LIKE
window.like=async(id,likes,owner)=>{
 await updateDoc(doc(db,"posts",id),{likes:likes+1});
 if(owner!==user){
  await addDoc(collection(db,"notifications"),{text:user+" liked your post",to:owner});
 }
};

// COMMENT
window.sendComment=async(id)=>{
 let input=document.getElementById("c-"+id);
 let text=input.value.trim();
 if(!text) return;

 let postRef=doc(db,"posts",id);
 let snap=await getDoc(postRef);
 let comments=snap.data().comments||[];

 comments.push(user+": "+text);
 await updateDoc(postRef,{comments});
 input.value="";
};

// FOLLOW
window.followUser=async(target)=>{
 if(target===user) return;

 let myRef=doc(db,"users",user);
 let tRef=doc(db,"users",target);

 let my=(await getDoc(myRef)).data();
 let t=(await getDoc(tRef)).data();

 let following=my.following||[];
 let followers=t.followers||[];

 if(following.includes(target)){
  following=following.filter(u=>u!==target);
  followers=followers.filter(u=>u!==user);
 }else{
  following.push(target);
  followers.push(user);
 }

 await updateDoc(myRef,{following});
 await updateDoc(tRef,{followers});
};

// FEED
function load(){
 onSnapshot(collection(db,"posts"), async (snap)=>{
  let html="";

  for(const d of snap.docs){
   let p=d.data();
   let userSnap=await getDoc(doc(db,"users",p.user));
   let online=userSnap.data()?.online;

   html+=`
   <div class="card">
    <b>${p.user} ${online?"🟢":"⚫"}</b>

    ${p.user!==user?`<button onclick="followUser('${p.user}')">Follow</button>`:""}

    <p>${p.text}</p>
    ${p.image?`<img src="${p.image}">`:""}

    ❤️ ${p.likes}
    <button onclick="like('${d.id}',${p.likes},'${p.user}')">Like</button>

    <div>${(p.comments||[]).map(c=>`<p>${c}</p>`).join("")}</div>

    <input id="c-${d.id}">
    <button onclick="sendComment('${d.id}')">Send</button>
   </div>`;
  }

  posts.innerHTML=html;
 });
}

// CHAT
window.openChat=()=>{
 currentChatUser=chatUser.value;
 loadChat();
 markSeen();
};

window.sendMsg=async ()=>{
 let text=msg.value;
 if(!text || !currentChatUser) return;

 await addDoc(collection(db,"messages"),{
  from:user,to:currentChatUser,text,seen:false
 });

 await setDoc(doc(db,"typing",user),{typing:false},{merge:true});
 msg.value="";
};

window.typing=async ()=>{
 if(!currentChatUser) return;

 await setDoc(doc(db,"typing",user),{
  to:currentChatUser,from:user,typing:true
 });
};

async function markSeen(){
 let snap=await getDocs(collection(db,"messages"));
 snap.forEach(async d=>{
  let m=d.data();
  if(m.to===user && m.from===currentChatUser && !m.seen){
    await updateDoc(doc(db,"messages",d.id),{seen:true});
  }
 });
}

function loadChat(){

 onSnapshot(collection(db,"messages"),(snap)=>{
  let html="";

  snap.forEach(d=>{
   let m=d.data();

   if((m.from===user && m.to===currentChatUser) || (m.from===currentChatUser && m.to===user)){
    let cls=m.from===user?"chat-me":"chat-other";
    let status=m.from===user?(m.seen?"✔️✔️ Seen":"✔️ Sent"):"";

    html+=`
    <div class="${cls}">
     ${m.text}
     <div class="status">${status}</div>
    </div>`;
   }
  });

  chatBox.innerHTML=html;
 });

 onSnapshot(collection(db,"typing"),(snap)=>{
  let tHtml="";

  snap.forEach(d=>{
   let t=d.data();
   if(t.to===user && t.from===currentChatUser && t.typing){
    tHtml=`<div class="typing">${currentChatUser} typing...</div>`;
   }
  });

  typingBox.innerHTML=tHtml;
 });

}

</script>

</body>
</html>
